---
# ==========================================
# Shared framework configuration.
# Sensitive values are intentionally sourced
# from inventory/group_vars/all/secrets.yml.
# ==========================================

# ==========================================
# 1. CLUSTER INFRASTRUCTURE (K3s)
# ==========================================
k3s_version: "v1.31.0+k3s1"
master_ip: "192.168.56.10"

# ==========================================
# 1a. DETERMINISTIC TOOLING + CHART VERSIONS
# Centralized version pins reduce drift between
# repeated installs and make upgrades explicit.
# ==========================================
artifact_versions:
  helm: "v3.20.2"
  python_kubernetes: "31.0.0"
  charts:
    opensearch: "2.36.0"
    opensearch_dashboards: "2.32.0"
    fluent_bit: "0.54.0"
    kube_prometheus_stack: "80.13.3"
    cloudnative_pg: "0.26.1"
    mongodb_kubernetes: "1.7.0"
    forgejo: "16.0.2"
  images:
    wekan: "v9.03"

# This token is loaded from the encrypted secrets file.
k3s_token: "{{ vault_k3s_token }}"

# ==========================================
# 2. SYSTEM SETTINGS
# ==========================================
ansible_user: "vagrant"
system_timezone: "UTC"
disable_swap: true              # K8s requirement
# The network interface used for cluster communication (192.168.56.x)
flannel_interface: "enp0s8"

# ==========================================
# 3. TOPOLOGY AND NODE POOLS
# Pool definitions are the single source of truth for
# worker labeling, tainting and workload placement.
# ==========================================
cluster_topology:
  control_plane_pool: "control_plane"
  default_worker_pool: "general"
  pool_group_prefix: "pool_"
  node_pools:
    control_plane:
      description: "K3s API server and control-plane services"
      workload_label: "control-plane"
      taints:
        - key: "node-role.kubernetes.io/control-plane"
          value: "true"
          effect: "NoSchedule"
    general:
      description: "Default application and shared service pool"
      workload_label: "general"
      taints:
        - key: "workload"
          value: "general"
          effect: "NoSchedule"
    database:
      description: "Stateful data services such as PostgreSQL or MongoDB"
      workload_label: "database"
      taints:
        - key: "workload"
          value: "database"
          effect: "PreferNoSchedule"
    logging:
      description: "Logging and search workloads"
      workload_label: "logging"
      taints:
        - key: "workload"
          value: "logging"
          effect: "NoSchedule"
    monitoring:
      description: "Prometheus, Grafana and alerting services"
      workload_label: "monitoring"
      taints:
        - key: "workload"
          value: "monitoring"
          effect: "NoSchedule"
    ai:
      description: "AI and anomaly-detection workloads"
      workload_label: "ai"
      taints:
        - key: "workload"
          value: "ai"
          effect: "NoSchedule"

# ==========================================
# 4. LOGGING (OpenSearch)
# ==========================================
opensearch:
  version: "2.12.0"
  admin_password: "{{ vault_opensearch_admin_password }}"
  exporter_image: "quay.io/prometheuscommunity/elasticsearch-exporter:v1.9.0"
  # Laptop-friendly JVM heap. Keeps OpenSearch usable without
  # forcing the logging VM to reserve multiple extra gigabytes.
  heap_size: "512m"
  storage_size: "10Gi"
  retention_days: 7
  pool: "logging"

# ==========================================
# 5. MONITORING (Prometheus & Grafana)
# ==========================================
monitoring:
  # Shorter retention reduces Prometheus RAM and disk pressure
  # on smaller single-user lab environments.
  prometheus_retention: "3d"
  grafana_admin_password: "{{ vault_grafana_admin_password }}"
  prometheus_storage: "5Gi"
  grafana_external_url: "http://{{ ingress.grafana_host }}"
  prometheus_external_url: "http://{{ ingress.prometheus_host }}"
  pool: "monitoring"
  # Keep Helm output hidden by default because the generated values include
  # Grafana and Alertmanager secrets. Set to false only for one-off debugging.
  helm_no_log: true
  recording_rules:
    enabled: true
  slo:
    enabled: true
    window: "5m"
    min_request_rate: 0.01
    http_5xx_warning_ratio: 0.05
    http_latency_p95_warning_seconds: 2
    deployment_availability_warning_ratio: 0.90
    statefulset_availability_warning_ratio: 0.90
  alerts:
    enabled: true
    target_down_for: "10m"
    pod_pending_for: "15m"
    pod_restart_window: "15m"
    pod_restart_warning_count: 5
    node_filesystem_warning_pct: 85
    pvc_warning_pct: 85
    pvc_critical_pct: 95
    traefik_5xx_warning_ratio: 0.05
    opensearch_disk_warning_pct: 85
    postgres_replication_lag_warning_seconds: 60
    postgres_replication_lag_critical_seconds: 300
    postgres_long_transaction_seconds: 900
    postgres_connections_warning_ratio: 0.80

alerting:
  enabled: true
  resolve_timeout: "5m"
  route:
    group_wait: "30s"
    group_interval: "5m"
    repeat_interval: "4h"
  email:
    enabled: false
    send_resolved: true
    # Format: "smtp-host:port". For Gmail, use "smtp.gmail.com:587"
    # with an app password in vault_alertmanager_smtp_password.
    smarthost: "smtp.example.com:587"
    from: "alerts@example.com"
    to: "ops@example.com"
    require_tls: true
    auth_enabled: true
    matchers:
      - 'severity=~"warning|critical"'
  telegram:
    enabled: true
    send_resolved: true
    # Create a bot with BotFather, then store the token and chat ID
    # in inventory/group_vars/all/secrets.yml.
    matchers:
      - 'severity=~"warning|critical"'
  slack:
    enabled: false
    send_resolved: true
    channel: "#alerts"
    # Uses a Slack incoming webhook URL stored in
    # vault_alertmanager_slack_api_url.
    matchers:
      - 'severity=~"warning|critical"'
  webex:
    enabled: false
    send_resolved: true
    room_id: "replace-with-webex-room-id"
    api_url: "https://webexapis.com/v1/messages"
    # Uses a Webex bot token stored in
    # vault_alertmanager_webex_bot_token.
    matchers:
      - 'severity=~"warning|critical"'
  pagerduty:
    enabled: false
    send_resolved: true
    # PagerDuty should usually page only critical alerts by default.
    # Change to severity=~"warning|critical" if you really want
    # warnings to create incidents too.
    matchers:
      - 'severity="critical"'

# ==========================================
# 6. DATABASE WORKER (CloudNativePG or MongoDB)
# ==========================================
database:
  # Supported values:
  #   - postgresql
  #   - mongodb
  type: "mongodb"
  # availability_goal controls how strictly the framework validates
  # the selected backend topology:
  #   - dev: single node/member is acceptable
  #   - replication: replicated data is desired, but quorum failover
  #                  is not required
  #   - quorum_ha: lose-one-node failover should remain possible
  availability_goal: "quorum_ha"
  namespace: "database"
  pool: "database"
  force_recreate: false
  storage_size: "2Gi"
  app_db_name: "app"
  app_user: "appuser"
  app_password: "{{ vault_database_app_password }}"
  scheduling:
    # Spread policy options:
    #   - required: every member/instance must land on a different node
    #   - preferred: spread when possible, but allow co-location
    #   - none: no anti-affinity spreading at all
    spread_policy: "required"
    # topology_key controls what "different node/location" means.
    # Common values:
    #   - kubernetes.io/hostname
    #   - topology.kubernetes.io/zone
    topology_key: "kubernetes.io/hostname"

  # PostgreSQL-specific settings
  cluster_name: "app-db-cluster"
  superuser_password: "{{ vault_database_superuser_password }}"
  port: 5432
  host: "app-db-cluster-rw.database.svc.cluster.local"
  postgresql:
    instances: 2

  # MongoDB-specific settings
  mongodb:
    # Keep the operator in the same namespace as the MongoDB resources.
    # MongoDB's docs require extra cross-namespace RBAC and service accounts
    # when operator.watchNamespace differs from the operator namespace.
    # Leave operator_namespace unset to default it to database.namespace.
    # Run the operator on the database pool by default now that the
    # reference lab DB nodes have 1 GiB RAM each.
    operator_pool: "database"
    cluster_name: "app-mongo-rs"
    host: "app-mongo-rs-svc.database.svc.cluster.local"
    port: 27017
    version: "7.0.5"
    members: 3
    admin_user: "mongo-admin"
    admin_password: "{{ vault_database_superuser_password }}"
    metrics:
      enabled: true
      username: "prometheus"
      password: "{{ vault_database_superuser_password }}"
      port: 9216
      path: "/metrics"
    # Lab-friendly defaults. Raise these in larger environments once the
    # database nodes have more headroom available.
    operator_resources:
      requests:
        cpu: "50m"
        memory: "96Mi"
      limits:
        cpu: "200m"
        memory: "192Mi"
    resources:
      mongod:
        requests:
          cpu: "100m"
          memory: "192Mi"
        limits:
          cpu: "500m"
          memory: "768Mi"
      agent:
        requests:
          cpu: "50m"
          memory: "96Mi"
        limits:
          cpu: "250m"
          memory: "256Mi"

# ==========================================
# 7. AI ANOMALY ENGINE
# ==========================================
ai_engine:
  namespace: "ai-engine"
  app_name: "pyod-anomaly-detector"
  runtime_base_image: "python:3.11-slim"
  image:
    repository: "observability-framework/ai-engine"
    tag: "0.1.0"
    pull_policy: "IfNotPresent"
  build:
    enabled: true
    platform: "linux/amd64"
    archive_path: "/tmp/observability-framework-ai-engine.tar"
  port: 8000
  anomaly_threshold: 0.90
  rolling_baseline_samples: 12
  contamination: 0.05
  training_window: "24h"
  lookback_hours: 24
  check_interval_seconds: 300
  step_seconds: 300
  min_training_samples: 36
  suppression_window_seconds: 1800
  pool: "ai"
  prometheus_url: "http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090"
  opensearch_url: "https://opensearch-cluster-master.opensearch.svc.cluster.local:9200"
  rule_thresholds:
    restart_delta_15m: 5
    pending_pods: 5
    failed_pods: 1
    node_not_ready: 1
    node_pressure: 1
    apiserver_5xx_rate: 0.10
    ingress_5xx_rate: 0.10
  severity_thresholds:
    critical_score: 0.97
  alerts:
    enabled: true
    metrics_missing_for: "10m"
    not_ready_for: "15m"
    stale_success_for: "20m"
    stale_success_seconds: 1800
    warning_severity_for: "10m"
    critical_severity_for: "5m"
    run_failure_window: "30m"
    run_failure_count: 3
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ==========================================
# 8. APPLICATION WORKLOADS
# ==========================================
forgejo:
  pool: "general"
  port: 8080
  admin_username: "forgejo_admin"
  admin_password: "{{ vault_forgejo_admin_password }}"
  admin_email: "admin@example.com"

wekan:
  enabled: true
  namespace: "wekan"
  pool: "general"
  replicas: 1
  port: 8080
  admin_username: "admin"
  admin_email: "admin@example.com"
  admin_password: "{{ vault_wekan_admin_password }}"
  mail_url: "smtp://:25/?ignoreTLS=true&tls={rejectUnauthorized:false}"
  mail_from: "WeKan Notifications"
  email_notification_timeout: "1000"
  meteor_reactivity_order: "polling"
  node_options: "--max_old_space_size=512"
  writable_path: "/data"
  image:
    repository: "wekanteam/wekan"
    tag: "{{ artifact_versions.images.wekan }}"
    pull_policy: "IfNotPresent"
  api_enabled: true
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1536Mi"

# ==========================================
# 9. PRODUCTION STORAGE SETTINGS
# ==========================================
storage:
  opensearch_size: "10Gi"
  prometheus_size: "5Gi"
  postgres_size: "5Gi"
  storage_class: "local-path"

# ==========================================
# 10. PRODUCTION REPLICAS
# ==========================================
replicas:
  opensearch: 1

# ==========================================
# 11. SERVICE PORTS
# ==========================================
grafana_port: 3000
opensearch_dashboards_port: 5601

# ==========================================
# 12. INGRESS CONFIGURATION
# ==========================================
ingress:
  class:           "traefik"
  base_domain:     "local"
  forgejo_host:    "forgejo.local"
  wekan_host:      "wekan.local"
  grafana_host:    "grafana.local"
  prometheus_host: "prometheus.local"
  opensearch_host: "opensearch.local"
  # Pre-cast port integers for Ingress port.number field
  # Kubernetes requires int32 — quoted Jinja2 returns string
  forgejo_port:    8080
  wekan_port:      8080
  grafana_port:    3000
  prometheus_port: 9090
  opensearch_port: 5601
