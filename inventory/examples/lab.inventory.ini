# Default lab topology.
# One general app node keeps the lab lighter, while three database nodes
# allow PostgreSQL or MongoDB to be tested with real node-level HA layouts.
[control_plane]
k8s-ctrl ansible_host=192.168.56.10 node_pool=control_plane

[pool_general]
app-node-1 ansible_host=192.168.56.11 node_pool=general

[pool_database]
db-node-1 ansible_host=192.168.56.13 node_pool=database
db-node-2 ansible_host=192.168.56.14 node_pool=database
db-node-3 ansible_host=192.168.56.18 node_pool=database

[pool_logging]
logging-node ansible_host=192.168.56.15 node_pool=logging

[pool_monitoring]
monitor-node ansible_host=192.168.56.16 node_pool=monitoring

[pool_ai]
ai-node ansible_host=192.168.56.17 node_pool=ai

[master:children]
control_plane

[workers:children]
pool_general
pool_database
pool_logging
pool_monitoring
pool_ai

[k8s_cluster:children]
master
workers
