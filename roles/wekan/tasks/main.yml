---
# ============================================================
# ROLE: wekan
# Deploys WeKan as the MongoDB-backed example application.
#
# Depends on:
#   - database   (MongoDBCommunity replica set must be healthy)
#   - monitoring (optional, for platform visibility)
#   - k3s_worker (general workload pool must be ready + tainted)
# ============================================================

- name: Validate WeKan admin password is configured
  ansible.builtin.fail:
    msg: >-
      vault_wekan_admin_password is required when deploying WeKan. Add it to
      inventory/group_vars/all/secrets.yml and rerun the wekan phase.
  vars:
    configured_wekan_password: "{{ vars.vault_wekan_admin_password | default('') | string | trim }}"
  when:
    - configured_wekan_password | length < 12

- name: Create WeKan namespace
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ wekan.namespace }}"

- name: Wait for MongoDB replica set to be running
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.command:
    argv:
      - kubectl
      - wait
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - --namespace
      - "{{ database.namespace }}"
      - --for=jsonpath={.status.phase}=Running
      - --timeout=10m
      - "mongodbcommunity/{{ database.mongodb.cluster_name }}"
  changed_when: false

- name: Create WeKan MongoDB connection secret
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: wekan-mongodb-secret
        namespace: "{{ wekan.namespace }}"
      type: Opaque
      stringData:
        MONGO_URL: >-
          mongodb://{{ database.app_user | urlencode }}:{{ database.app_password | urlencode }}@{{ database.mongodb.host }}:{{ database.mongodb.port | int }}/{{ database.app_db_name }}?replicaSet={{ database.mongodb.cluster_name }}&authSource={{ database.app_db_name }}
  no_log: true

- name: Create WeKan admin secret
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: wekan-admin-secret
        namespace: "{{ wekan.namespace }}"
      type: Opaque
      stringData:
        username: "{{ wekan.admin_username }}"
        email: "{{ wekan.admin_email }}"
        password: "{{ wekan.admin_password }}"
  no_log: true

- name: Stage WeKan Helm chart on the control-plane node
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    src: "{{ role_path }}/chart/"
    dest: /tmp/observability-framework-wekan-chart/

- name: Deploy WeKan via local Helm chart
  become: true
  delegate_to: k8s-ctrl
  community.kubernetes.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: wekan
    chart_ref: /tmp/observability-framework-wekan-chart
    release_namespace: "{{ wekan.namespace }}"
    create_namespace: false
    wait: yes
    timeout: "900s"
    values:
      replicaCount: "{{ wekan.replicas | int }}"
      image:
        repository: "{{ wekan.image.repository }}"
        tag: "{{ wekan.image.tag }}"
        pullPolicy: "{{ wekan.image.pull_policy }}"
      service:
        type: ClusterIP
        port: "{{ wekan.port | int }}"
      ingress:
        enabled: true
        className: "{{ ingress.class }}"
        host: "{{ ingress.wekan_host }}"
        path: /
      env:
        rootUrl: "http://{{ ingress.wekan_host }}"
        port: "{{ wekan.port | string }}"
        withApi: "{{ wekan.api_enabled | bool | ternary('true', 'false') }}"
        mailUrl: "{{ wekan.mail_url }}"
        mailFrom: "{{ wekan.mail_from }}"
        emailNotificationTimeout: "{{ wekan.email_notification_timeout | string }}"
        meteorReactivityOrder: "{{ wekan.meteor_reactivity_order }}"
        nodeOptions: "{{ wekan.node_options }}"
        writablePath: "{{ wekan.writable_path }}"
      existingSecret:
        name: wekan-mongodb-secret
        mongoUrlKey: MONGO_URL
      adminSecret:
        name: wekan-admin-secret
        usernameKey: username
        emailKey: email
        passwordKey: password
      resources: "{{ wekan.resources }}"
      extraVolumes:
        - name: wekan-data
          emptyDir: {}
      extraVolumeMounts:
        - name: wekan-data
          mountPath: "{{ wekan.writable_path }}"
      nodeSelector:
        workload: "{{ cluster_topology.node_pools[wekan.pool].workload_label }}"
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "{{ cluster_topology.node_pools[wekan.pool].workload_label }}"
          effect: "{{ cluster_topology.node_pools[wekan.pool].taints[0].effect }}"

- name: Wait for WeKan deployment rollout
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.command:
    argv:
      - kubectl
      - rollout
      - status
      - deployment/wekan
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - -n
      - "{{ wekan.namespace }}"
      - --timeout=10m
  changed_when: false

- name: Wait for WeKan pod to become Ready
  become: true
  delegate_to: k8s-ctrl
  block:
    - name: Wait for WeKan Ready condition
      ansible.builtin.command:
        argv:
          - kubectl
          - wait
          - pod
          - -n
          - "{{ wekan.namespace }}"
          - -l
          - app.kubernetes.io/name=wekan,app.kubernetes.io/instance=wekan
          - --for=condition=Ready
          - --timeout=30m
          - --kubeconfig
          - /etc/rancher/k3s/k3s.yaml
      changed_when: false
  rescue:
    - name: Capture WeKan pod diagnostics
      ansible.builtin.shell: |
        set +e
        echo "== pods =="
        kubectl get pods --kubeconfig /etc/rancher/k3s/k3s.yaml -n {{ wekan.namespace }} -o wide
        echo
        echo "== describe =="
        kubectl describe pods --kubeconfig /etc/rancher/k3s/k3s.yaml -n {{ wekan.namespace }} -l app.kubernetes.io/name=wekan,app.kubernetes.io/instance=wekan
        echo
        echo "== logs =="
        kubectl logs --kubeconfig /etc/rancher/k3s/k3s.yaml -n {{ wekan.namespace }} -l app.kubernetes.io/name=wekan,app.kubernetes.io/instance=wekan --tail=200
        echo
        echo "== previous logs =="
        kubectl logs --kubeconfig /etc/rancher/k3s/k3s.yaml -n {{ wekan.namespace }} -l app.kubernetes.io/name=wekan,app.kubernetes.io/instance=wekan --previous --tail=200
      register: wekan_ready_diagnostics
      changed_when: false
      failed_when: false

    - name: Show WeKan readiness diagnostics
      ansible.builtin.debug:
        var: wekan_ready_diagnostics.stdout_lines

    - name: Fail because WeKan did not become Ready
      ansible.builtin.fail:
        msg: "WeKan did not become Ready before admin bootstrap."

- name: Look up WeKan service ClusterIP
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get svc wekan \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n {{ wekan.namespace }} \
      -o jsonpath='{.spec.clusterIP}'
  register: wekan_service_ip
  changed_when: false

- name: Verify WeKan is responding through the service
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.command:
    argv:
      - curl
      - -sS
      - -o
      - /dev/null
      - -w
      - "%{http_code}"
      - -H
      - "Host: {{ ingress.wekan_host }}"
      - "http://{{ wekan_service_ip.stdout }}:{{ wekan.port }}/"
  register: wekan_health
  until: wekan_health.rc == 0 and wekan_health.stdout in ['200', '302']
  retries: 30
  delay: 15
  changed_when: false

- name: Create temporary WeKan bootstrap payload directory
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.tempfile:
    state: directory
    suffix: wekan-bootstrap
  register: wekan_bootstrap_tmp

- name: Write WeKan JSON login payload
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    dest: "{{ wekan_bootstrap_tmp.path }}/login.json"
    mode: '0600'
    content: "{{ {'username': wekan.admin_username, 'password': wekan.admin_password} | to_json }}"
  no_log: true

- name: Write WeKan JSON register payload
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    dest: "{{ wekan_bootstrap_tmp.path }}/register.json"
    mode: '0600'
    content: "{{ {'username': wekan.admin_username, 'email': wekan.admin_email, 'password': wekan.admin_password} | to_json }}"
  no_log: true

- name: Write WeKan form login payload
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    dest: "{{ wekan_bootstrap_tmp.path }}/login.form"
    mode: '0600'
    content: "username={{ wekan.admin_username | urlencode }}&password={{ wekan.admin_password | urlencode }}"
  no_log: true

- name: Write WeKan form register payload
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    dest: "{{ wekan_bootstrap_tmp.path }}/register.form"
    mode: '0600'
    content: "username={{ wekan.admin_username | urlencode }}&email={{ wekan.admin_email | urlencode }}&password={{ wekan.admin_password | urlencode }}"
  no_log: true

- name: Check configured WeKan admin login with JSON and form payloads
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    set +e
    json_code="$(curl -sS -o /dev/null -w "%{http_code}" \
      -X POST \
      -H "Host: {{ ingress.wekan_host }}" \
      -H "Content-Type: application/json" \
      -H "Accept: */*" \
      --data-binary @{{ wekan_bootstrap_tmp.path }}/login.json \
      http://{{ wekan_service_ip.stdout }}:{{ wekan.port }}/users/login)"
    form_code="$(curl -sS -o /dev/null -w "%{http_code}" \
      -X POST \
      -H "Host: {{ ingress.wekan_host }}" \
      -H "Content-Type: application/x-www-form-urlencoded" \
      -H "Accept: */*" \
      --data-binary @{{ wekan_bootstrap_tmp.path }}/login.form \
      http://{{ wekan_service_ip.stdout }}:{{ wekan.port }}/users/login)"
    printf 'json=%s form=%s\n' "$json_code" "$form_code"
    if [ "$json_code" = "200" ] || [ "$form_code" = "200" ]; then
      exit 0
    fi
    exit 1
  register: wekan_admin_login_initial
  changed_when: false
  failed_when: false

- name: Register configured WeKan admin account with JSON payload
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.command:
    argv:
      - curl
      - -sS
      - -o
      - /dev/null
      - -w
      - "%{http_code}"
      - -X
      - POST
      - -H
      - "Host: {{ ingress.wekan_host }}"
      - -H
      - "Content-Type: application/json"
      - -H
      - "Accept: */*"
      - --data-binary
      - "@{{ wekan_bootstrap_tmp.path }}/register.json"
      - "http://{{ wekan_service_ip.stdout }}:{{ wekan.port }}/users/register"
  register: wekan_admin_register_json
  changed_when: wekan_admin_register_json.stdout in ['200', '201']
  failed_when: false
  when: wekan_admin_login_initial.rc != 0

- name: Register configured WeKan admin account with form payload
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.command:
    argv:
      - curl
      - -sS
      - -o
      - /dev/null
      - -w
      - "%{http_code}"
      - -X
      - POST
      - -H
      - "Host: {{ ingress.wekan_host }}"
      - -H
      - "Content-Type: application/x-www-form-urlencoded"
      - -H
      - "Accept: */*"
      - --data-binary
      - "@{{ wekan_bootstrap_tmp.path }}/register.form"
      - "http://{{ wekan_service_ip.stdout }}:{{ wekan.port }}/users/register"
  register: wekan_admin_register_form
  changed_when: wekan_admin_register_form.stdout in ['200', '201']
  failed_when: false
  when:
    - wekan_admin_login_initial.rc != 0
    - wekan_admin_register_json.stdout | default('') not in ['200', '201']

- name: Show sanitized WeKan registration attempt status
  ansible.builtin.debug:
    msg:
      - "Initial login: {{ wekan_admin_login_initial.stdout | default('not-run') }}"
      - "JSON register: {{ wekan_admin_register_json.stdout | default('skipped') }}"
      - "Form register: {{ wekan_admin_register_form.stdout | default('skipped') }}"

- name: Generate bcrypt hash for configured WeKan admin password
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    wekan_pod="$(kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n {{ wekan.namespace }} \
      -l app.kubernetes.io/name=wekan,app.kubernetes.io/instance=wekan \
      -o jsonpath='{.items[0].metadata.name}')"
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n {{ wekan.namespace }} \
      "$wekan_pod" \
      -c wekan \
      -- node -e '
        const candidates = [
          "bcrypt",
          "bcryptjs",
          "/build/node_modules/bcrypt",
          "/build/node_modules/bcryptjs",
          "/build/programs/server/node_modules/bcrypt",
          "/build/programs/server/node_modules/bcryptjs",
          "/build/programs/server/npm/node_modules/bcrypt",
          "/build/programs/server/npm/node_modules/bcryptjs",
          "/build/programs/server/npm/node_modules/meteor/npm-bcrypt/node_modules/bcrypt",
          "/build/programs/server/npm/node_modules/meteor/npm-bcrypt/node_modules/bcryptjs",
          "/build/programs/server/npm/node_modules/meteor/accounts-password/node_modules/bcrypt",
          "/build/programs/server/npm/node_modules/meteor/accounts-password/node_modules/bcryptjs",
          "/app/bundle/programs/server/npm/node_modules/bcrypt",
          "/app/bundle/programs/server/npm/node_modules/bcryptjs"
        ];
        let bcrypt;
        for (const candidate of candidates) {
          try {
            bcrypt = require(candidate);
            break;
          } catch (error) {}
        }
        if (!bcrypt || typeof bcrypt.hashSync !== "function") {
          console.error("bcrypt module is not available in the WeKan container");
          process.exit(1);
        }
        if (!process.env.ADMIN_PASSWORD) {
          console.error("ADMIN_PASSWORD is not available in the WeKan container");
          process.exit(1);
        }
        const crypto = require("crypto");
        const passwordDigest = crypto
          .createHash("sha256")
          .update(process.env.ADMIN_PASSWORD)
          .digest("hex");
        console.log(bcrypt.hashSync(passwordDigest, 10));
      '
  register: wekan_admin_password_bcrypt
  changed_when: false
  no_log: true

- name: Write WeKan admin Mongo seed script
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    dest: "{{ wekan_bootstrap_tmp.path }}/seed-admin.js"
    mode: '0600'
    content: |
      const username = {{ wekan.admin_username | to_json }};
      const email = {{ wekan.admin_email | to_json }};
      const passwordHash = {{ (wekan_admin_password_bcrypt.stdout | trim) | to_json }};
      const now = new Date();

      function randomId(length = 17) {
        const alphabet = "23456789ABCDEFGHJKLMNPQRSTWXYZabcdefghijkmnopqrstuvwxyz";
        let value = "";
        for (let i = 0; i < length; i += 1) {
          value += alphabet[Math.floor(Math.random() * alphabet.length)];
        }
        return value;
      }

      const selector = { $or: [{ username }, { "emails.address": email }] };
      const userFields = {
        username,
        emails: [{ address: email, verified: true }],
        services: {
          password: { bcrypt: passwordHash },
          resume: { loginTokens: [] }
        },
        profile: {
          fullname: username,
          initials: username.substring(0, 2).toUpperCase(),
          boardView: "board-view-swimlanes"
        },
        isAdmin: true,
        createdThroughApi: true,
        loginDisabled: false,
        authenticationMethod: "password",
        sessionData: {},
        modifiedAt: now
      };

      const existing = db.users.findOne(selector);
      if (existing) {
        db.users.updateOne({ _id: existing._id }, { $set: userFields });
        print("admin_seed=updated");
      } else {
        db.users.insertOne({ _id: randomId(), createdAt: now, ...userFields });
        print("admin_seed=inserted");
      }
      print("admin_user_count=" + db.users.countDocuments(selector));
  no_log: true

- name: Seed configured WeKan admin account directly in MongoDB
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    mongo_url="$(kubectl get secret wekan-mongodb-secret \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n {{ wekan.namespace }} \
      -o jsonpath='{.data.MONGO_URL}' | base64 -d)"
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -i \
      -n {{ database.namespace }} \
      {{ database.mongodb.cluster_name }}-0 \
      -c mongod \
      -- mongosh "$mongo_url" --quiet < {{ wekan_bootstrap_tmp.path }}/seed-admin.js
  register: wekan_admin_seed
  changed_when: "'admin_seed=inserted' in (wekan_admin_seed.stdout | default(''))"
  no_log: true

- name: Verify configured WeKan admin seed result
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    mongo_url="$(kubectl get secret wekan-mongodb-secret \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n {{ wekan.namespace }} \
      -o jsonpath='{.data.MONGO_URL}' | base64 -d)"
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n {{ database.namespace }} \
      {{ database.mongodb.cluster_name }}-0 \
      -c mongod \
      -- mongosh "$mongo_url" --quiet --eval \
      'const username = {{ wekan.admin_username | to_json }}; const email = {{ wekan.admin_email | to_json }}; print("admin_user_count=" + db.users.countDocuments({ $or: [{ username: username }, { "emails.address": email }] }));'
  register: wekan_admin_seed_check
  changed_when: false

- name: Show sanitized WeKan admin seed status
  ansible.builtin.debug:
    msg: "{{ wekan_admin_seed_check.stdout }}"

- name: Wait for configured WeKan admin user record to exist
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    set +e
    mongo_url="$(kubectl get secret wekan-mongodb-secret \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n {{ wekan.namespace }} \
      -o jsonpath='{.data.MONGO_URL}' | base64 -d)"

    for attempt in $(seq 1 30); do
      login_json_code="$(curl -sS -o /dev/null -w "%{http_code}" \
        -X POST \
        -H "Host: {{ ingress.wekan_host }}" \
        -H "Content-Type: application/json" \
        -H "Accept: */*" \
        --data-binary @{{ wekan_bootstrap_tmp.path }}/login.json \
        http://{{ wekan_service_ip.stdout }}:{{ wekan.port }}/users/login)"
      login_form_code="$(curl -sS -o /dev/null -w "%{http_code}" \
        -X POST \
        -H "Host: {{ ingress.wekan_host }}" \
        -H "Content-Type: application/x-www-form-urlencoded" \
        -H "Accept: */*" \
        --data-binary @{{ wekan_bootstrap_tmp.path }}/login.form \
        http://{{ wekan_service_ip.stdout }}:{{ wekan.port }}/users/login)"

      register_json_code="skipped"
      register_form_code="skipped"
      if [ "$login_json_code" != "200" ] && [ "$login_form_code" != "200" ]; then
        register_json_code="$(curl -sS -o /dev/null -w "%{http_code}" \
          -X POST \
          -H "Host: {{ ingress.wekan_host }}" \
          -H "Content-Type: application/json" \
          -H "Accept: */*" \
          --data-binary @{{ wekan_bootstrap_tmp.path }}/register.json \
          http://{{ wekan_service_ip.stdout }}:{{ wekan.port }}/users/register)"
        if [ "$register_json_code" != "200" ] && [ "$register_json_code" != "201" ]; then
          register_form_code="$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Host: {{ ingress.wekan_host }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "Accept: */*" \
            --data-binary @{{ wekan_bootstrap_tmp.path }}/register.form \
            http://{{ wekan_service_ip.stdout }}:{{ wekan.port }}/users/register)"
        fi
      fi

      raw_count="$(kubectl exec \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -n {{ database.namespace }} \
        {{ database.mongodb.cluster_name }}-0 \
        -c mongod \
        -- mongosh "$mongo_url" --quiet --eval \
        'const username = {{ wekan.admin_username | to_json }}; const email = {{ wekan.admin_email | to_json }}; print(db.users.countDocuments({ $or: [{ username: username }, { "emails.address": email }] }));' 2>/dev/null)"
      query_rc=$?
      user_count="$(printf '%s\n' "$raw_count" | tail -n 1 | tr -dc '0-9')"

      if [ "$query_rc" -eq 0 ] && [ "${user_count:-0}" -ge 1 ]; then
        printf 'admin_user_count=%s\n' "$user_count"
        exit 0
      fi

      printf 'attempt=%s login_json=%s login_form=%s register_json=%s register_form=%s mongo_query_rc=%s admin_user_count=%s\n' "$attempt" "$login_json_code" "$login_form_code" "$register_json_code" "$register_form_code" "$query_rc" "${user_count:-0}"
      sleep 5
    done

    echo "WeKan admin user was not found in MongoDB after registration attempts."
    echo "Registration status: initial_login={{ wekan_admin_login_initial.stdout | default('not-run') }}, json_register={{ wekan_admin_register_json.stdout | default('skipped') }}, form_register={{ wekan_admin_register_form.stdout | default('skipped') }}"
    exit 1
  register: wekan_admin_user_count
  changed_when: false

- name: Ensure configured WeKan user has admin permissions
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    mongo_url="$(kubectl get secret wekan-mongodb-secret \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n {{ wekan.namespace }} \
      -o jsonpath='{.data.MONGO_URL}' | base64 -d)"
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n {{ database.namespace }} \
      {{ database.mongodb.cluster_name }}-0 \
      -c mongod \
      -- mongosh "$mongo_url" --quiet --eval \
      'const username = {{ wekan.admin_username | to_json }}; const email = {{ wekan.admin_email | to_json }}; const result = db.users.updateOne({ $or: [{ username: username }, { "emails.address": email }] }, { $set: { isAdmin: true } }); print("matched=" + result.matchedCount + " modified=" + result.modifiedCount);'
  register: wekan_admin_update
  changed_when: false

- name: Verify configured WeKan admin login with JSON and form payloads
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    set +e
    json_code="$(curl -sS -o /dev/null -w "%{http_code}" \
      -X POST \
      -H "Host: {{ ingress.wekan_host }}" \
      -H "Content-Type: application/json" \
      -H "Accept: */*" \
      --data-binary @{{ wekan_bootstrap_tmp.path }}/login.json \
      http://{{ wekan_service_ip.stdout }}:{{ wekan.port }}/users/login)"
    form_code="$(curl -sS -o /dev/null -w "%{http_code}" \
      -X POST \
      -H "Host: {{ ingress.wekan_host }}" \
      -H "Content-Type: application/x-www-form-urlencoded" \
      -H "Accept: */*" \
      --data-binary @{{ wekan_bootstrap_tmp.path }}/login.form \
      http://{{ wekan_service_ip.stdout }}:{{ wekan.port }}/users/login)"
    printf 'json=%s form=%s\n' "$json_code" "$form_code"
    if [ "$json_code" = "200" ] || [ "$form_code" = "200" ]; then
      exit 0
    fi
    exit 1
  register: wekan_admin_login
  until: wekan_admin_login.rc == 0
  retries: 20
  delay: 10
  changed_when: false

- name: Show sanitized WeKan admin bootstrap status
  ansible.builtin.debug:
    msg:
      - "Initial login: {{ wekan_admin_login_initial.stdout | default('not-run') }}"
      - "JSON register: {{ wekan_admin_register_json.stdout | default('skipped') }}"
      - "Form register: {{ wekan_admin_register_form.stdout | default('skipped') }}"
      - "Final login: {{ wekan_admin_login.stdout | default('not-run') }}"

- name: Remove temporary WeKan bootstrap payload directory
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.file:
    path: "{{ wekan_bootstrap_tmp.path }}"
    state: absent

- name: Verify WeKan is reachable through Ingress
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    curl -sk \
      -o /dev/null \
      -w "%{http_code}" \
      -H "Host: {{ ingress.wekan_host }}" \
      http://{{ master_ip }}/
  register: wekan_http_check
  until: wekan_http_check.stdout in ['200', '302']
  retries: 30
  delay: 10
  changed_when: false

- name: Show WeKan pod summary
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n {{ wekan.namespace }} \
      -o wide
  register: wekan_pods
  changed_when: false

- name: Print WeKan access summary
  ansible.builtin.debug:
    msg:
      - "=============================================="
      - " WeKan MongoDB Example App"
      - "=============================================="
      - " Add to /etc/hosts on your host machine:"
      - " {{ master_ip }}  {{ ingress.wekan_host }}"
      - ""
      - " URL: http://{{ ingress.wekan_host }}"
      - " Service check: HTTP {{ wekan_health.stdout }}"
      - " Ingress check: HTTP {{ wekan_http_check.stdout }}"
      - " Pods:"
      - "{{ wekan_pods.stdout_lines }}"
      - "=============================================="
