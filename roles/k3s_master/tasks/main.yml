---
# ============================================================
# ROLE: k3s_master
# Installs K3s control plane, configures kubeconfig access
# and verifies the API server is healthy before workers join.
# ============================================================

# ============================================================
# 1. Install K3s Control Plane
# ============================================================
- name: Ensure K3s config directory exists on control plane
  become: true
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: '0700'

- name: Download pinned K3s binary for control plane
  become: true
  vars:
    k3s_binary_asset: >-
      {% if ansible_architecture in ['x86_64', 'amd64'] %}k3s{% elif ansible_architecture in ['aarch64', 'arm64'] %}k3s-arm64{% else %}k3s{% endif %}
    k3s_download_path: "/tmp/k3s-{{ k3s_version }}"
  block:
    - name: Check installed K3s version on control plane
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - --version
      register: k3s_server_version
      changed_when: false
      failed_when: false

    - name: Download pinned K3s binary for control plane with curl
      ansible.builtin.command:
        argv:
          - curl
          - -fsSL
          - "https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/{{ k3s_binary_asset }}"
          - -o
          - "{{ k3s_download_path }}"
      when: k3s_server_version.rc != 0 or k3s_version not in k3s_server_version.stdout

    - name: Install pinned K3s binary on control plane
      ansible.builtin.command:
        argv:
          - install
          - -m
          - "0755"
          - "{{ k3s_download_path }}"
          - /usr/local/bin/k3s
      register: k3s_server_binary
      when: k3s_server_version.rc != 0 or k3s_version not in k3s_server_version.stdout

    - name: Mark K3s binary unchanged when pinned version already present
      ansible.builtin.set_fact:
        k3s_server_binary:
          changed: false
      when: k3s_server_version.rc == 0 and k3s_version in k3s_server_version.stdout

- name: Ensure kubectl symlink points to pinned K3s binary on control plane
  become: true
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link

- name: Render pinned K3s server config
  become: true
  ansible.builtin.template:
    src: k3s-config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: '0600'
  register: k3s_server_config
  no_log: true

- name: Install K3s systemd service for control plane
  become: true
  ansible.builtin.template:
    src: k3s.service.j2
    dest: /etc/systemd/system/k3s.service
    mode: '0644'
  register: k3s_server_service

- name: Start and enable K3s control plane service
  become: true
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    daemon_reload: true
    state: "{{ 'restarted' if (k3s_server_binary.changed or k3s_server_config.changed or k3s_server_service.changed) else 'started' }}"

# ============================================================
# 2. Wait for kubeconfig to exist
# K3s writes this file once the API server is ready.
# Nothing else can proceed without it.
# ============================================================
- name: Wait for K3s kubeconfig to exist
  become: true
  ansible.builtin.wait_for:
    path: /etc/rancher/k3s/k3s.yaml
    state: present
    timeout: 120

# ============================================================
# 3. Configure kubeconfig Access
# ============================================================
- name: Set permissions on kubeconfig for non-root access
  become: true
  ansible.builtin.file:
    path: /etc/rancher/k3s/k3s.yaml
    mode: '0600'

- name: Ensure .kube directory exists in user home
  become: true
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    mode: '0700'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Copy kubeconfig to user .kube/config
  become: true
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ ansible_user }}/.kube/config"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
    remote_src: yes

# ============================================================
# 4. Verify API Server is Healthy
# Polls the /healthz endpoint until K3s API responds OK.
# This guarantees workers can safely join in Phase 3.
# Without this check workers may try to join before the
# API server is fully ready and fail to register.
# ============================================================
- name: Wait for K3s API server to be healthy
  become: true
  ansible.builtin.shell: |
    kubectl get nodes \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -o jsonpath='{.items[0].status.conditions[-1].status}'
  register: master_ready
  until: master_ready.stdout == "True"
  retries: 30
  delay: 10
  changed_when: false

# ============================================================
# 5. Label Control-Plane Nodes
# Keeps topology metadata on the node itself. We delay the
# control-plane taint until workers have joined so bootstrap
# jobs like helm-install-traefik always have a place to run
# during fresh cluster creation.
# ============================================================
- name: Label control-plane node with pool metadata
  become: true
  ansible.builtin.command:
    argv:
      - kubectl
      - label
      - node
      - "{{ inventory_hostname }}"
      - "observability.framework/pool={{ cluster_topology.control_plane_pool }}"
      - "workload={{ cluster_topology.node_pools[cluster_topology.control_plane_pool].workload_label }}"
      - "kubernetes.io/role=control-plane"
      - --overwrite
      - --kubeconfig=/etc/rancher/k3s/k3s.yaml
  register: control_plane_label
  changed_when: "'not labeled' not in control_plane_label.stdout"

# ============================================================
# 6. Enable Traefik Metrics
# K3s manages Traefik via Helm; HelmChartConfig is the
# supported way to turn on the Prometheus metrics endpoint.
# ============================================================
- name: Install Traefik HelmChartConfig for Prometheus metrics
  become: true
  ansible.builtin.copy:
    dest: /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
    mode: '0644'
    content: "{{ lookup('template', 'traefik-helmchartconfig.yaml.j2') }}"

# ============================================================
# 7. Verify Traefik Ingress Controller is Running
# K3s deploys Traefik automatically through its Helm controller.
# We confirm it is running before Phase 7 ingress rules
# are created — if Traefik is not ready the Ingress
# resources will exist but no traffic will be routed.
# ============================================================
- name: Wait for K3s Helm controller to create Traefik deployment
  become: true
  ansible.builtin.command:
    argv:
      - kubectl
      - get
      - deployment
      - traefik
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - --namespace
      - kube-system
  register: traefik_deployment
  until: traefik_deployment.rc == 0
  retries: 60
  delay: 5
  changed_when: false

- name: Wait for Traefik ingress controller deployment to become available
  become: true
  ansible.builtin.command:
    argv:
      - kubectl
      - wait
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - --namespace
      - kube-system
      - --for=condition=Available
      - --timeout=300s
      - deployment
      - traefik
  register: traefik_status
  changed_when: false

# ============================================================
# 8. Expose Traefik Metrics
# A dedicated in-cluster Service keeps the Prometheus target
# stable even if K3s changes the default Traefik Service.
# The ServiceMonitor is created later by the monitoring role,
# after the Prometheus Operator CRDs exist.
# ============================================================
- name: Create Traefik metrics service
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'traefik-metrics-service.yaml.j2') | from_yaml }}"

- name: Wait for Traefik metrics endpoints to exist
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get endpoints \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n kube-system \
      traefik-metrics \
      -o jsonpath='{.subsets[*].addresses[*].ip}'
  register: traefik_metrics_endpoints
  until: traefik_metrics_endpoints.stdout | trim | length > 0
  retries: 30
  delay: 10
  changed_when: false

# ============================================================
# 8. Show Master Node Status
# Final confirmation before handing off to Phase 3.
# Shows node name, status, K3s version and internal IP.
# ============================================================
- name: Show master node status
  become: true
  ansible.builtin.shell: |
    kubectl get nodes \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -o wide
  register: master_status
  changed_when: false

- name: Print master node status
  ansible.builtin.debug:
    var: master_status.stdout_lines
