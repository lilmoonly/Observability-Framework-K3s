---
# ============================================================
# ROLE: ingress
# Creates Traefik Ingress resources for all framework services.
# Replaces port-based LoadBalancer routing with clean
# hostname-based routing through a single entry point.
#
# Traefik is built into K3s — no installation needed.
# All services must be ClusterIP before this role runs.
#
# Required /etc/hosts entries on host machine:
#   192.168.56.10  forgejo.local
#   192.168.56.10  grafana.local
#   192.168.56.10  opensearch.local
#
# Depends on:
#   - k3s_master (Traefik is deployed by K3s automatically)
#   - logging    (opensearch-dashboards service must exist)
#   - monitoring (prometheus-grafana service must exist)
#   - forgejo    (forgejo-http service must exist)
# ============================================================

# ============================================================
# 1. Verify Traefik is Running
# ============================================================
- name: Verify Traefik ingress controller is running
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n kube-system \
      -l app.kubernetes.io/name=traefik \
      -o jsonpath='{.items[0].status.phase}'
  register: traefik_status
  until: traefik_status.stdout == "Running"
  retries: 20
  delay: 10
  changed_when: false

- name: Show Traefik status
  ansible.builtin.debug:
    msg: "Traefik ingress controller: {{ traefik_status.stdout }}"

# ============================================================
# 2. Render Ingress Templates to Control Plane
# Templates are rendered on the Ansible controller and
# copied to k8s-ctrl so kubectl apply can use them.
# This guarantees port numbers are native YAML integers
# and not strings — kubernetes requires int32.
# ============================================================
- name: Render OpenSearch Dashboards Ingress template
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    content: "{{ lookup('template', 'opensearch-ingress.yaml.j2') }}"
    dest: /tmp/opensearch-ingress.yaml
    mode: '0644'

- name: Render Grafana Ingress template
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    content: "{{ lookup('template', 'grafana-ingress.yaml.j2') }}"
    dest: /tmp/grafana-ingress.yaml
    mode: '0644'

- name: Render Forgejo Ingress template
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    content: "{{ lookup('template', 'forgejo-ingress.yaml.j2') }}"
    dest: /tmp/forgejo-ingress.yaml
    mode: '0644'

# ============================================================
# 3. Apply Ingress Resources via kubectl
# Using kubectl apply guarantees the YAML is parsed
# as-is — no Ansible type coercion, no string wrapping.
# Port numbers stay as integers exactly as written
# in the template files above.
# ============================================================

# Exposes: http://opensearch.local
- name: Apply OpenSearch Dashboards Ingress
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl apply \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -f /tmp/opensearch-ingress.yaml
  register: opensearch_ingress_result
  changed_when: "'created' in opensearch_ingress_result.stdout or
                 'configured' in opensearch_ingress_result.stdout"

- name: Show OpenSearch Ingress apply result
  ansible.builtin.debug:
    msg: "{{ opensearch_ingress_result.stdout }}"

# Exposes: http://grafana.local
- name: Apply Grafana Ingress
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl apply \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -f /tmp/grafana-ingress.yaml
  register: grafana_ingress_result
  changed_when: "'created' in grafana_ingress_result.stdout or
                 'configured' in grafana_ingress_result.stdout"

- name: Show Grafana Ingress apply result
  ansible.builtin.debug:
    msg: "{{ grafana_ingress_result.stdout }}"

# Exposes: http://forgejo.local
- name: Apply Forgejo Ingress
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl apply \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -f /tmp/forgejo-ingress.yaml
  register: forgejo_ingress_result
  changed_when: "'created' in forgejo_ingress_result.stdout or
                 'configured' in forgejo_ingress_result.stdout"

- name: Show Forgejo Ingress apply result
  ansible.builtin.debug:
    msg: "{{ forgejo_ingress_result.stdout }}"

# ============================================================
# 4. Verify All Ingress Resources Were Created
# ============================================================
- name: Verify all Ingress resources exist
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get ingress \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      --all-namespaces \
      -o wide
  register: ingress_summary
  changed_when: false

- name: Print Ingress summary
  ansible.builtin.debug:
    var: ingress_summary.stdout_lines

# ============================================================
# 5. Verify Each Service is Reachable Through Ingress
# Uses curl with Host header to simulate DNS resolution
# so we do not depend on /etc/hosts being set up yet.
# A 200 or 302 response confirms routing is working.
# ============================================================
- name: Verify Forgejo is reachable through Ingress
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    curl -sk \
      -o /dev/null \
      -w "%{http_code}" \
      -H "Host: {{ ingress.forgejo_host }}" \
      http://{{ master_ip }}/
  register: forgejo_http_check
  until: forgejo_http_check.stdout in ['200', '302']
  retries: 20
  delay: 10
  changed_when: false

- name: Show Forgejo HTTP response code
  ansible.builtin.debug:
    msg: "Forgejo via Ingress → HTTP {{ forgejo_http_check.stdout }}"

- name: Verify Grafana is reachable through Ingress
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    curl -sk \
      -o /dev/null \
      -w "%{http_code}" \
      -H "Host: {{ ingress.grafana_host }}" \
      http://{{ master_ip }}/
  register: grafana_http_check
  until: grafana_http_check.stdout in ['200', '302']
  retries: 20
  delay: 10
  changed_when: false

- name: Show Grafana HTTP response code
  ansible.builtin.debug:
    msg: "Grafana via Ingress → HTTP {{ grafana_http_check.stdout }}"

- name: Verify OpenSearch Dashboards is reachable through Ingress
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    curl -sk \
      -o /dev/null \
      -w "%{http_code}" \
      -H "Host: {{ ingress.opensearch_host }}" \
      http://{{ master_ip }}/
  register: opensearch_http_check
  until: opensearch_http_check.stdout in ['200', '302']
  retries: 20
  delay: 10
  changed_when: false

- name: Show OpenSearch Dashboards HTTP response code
  ansible.builtin.debug:
    msg: "OpenSearch Dashboards via Ingress → HTTP {{ opensearch_http_check.stdout }}"

# ============================================================
# 6. Cleanup Temp Files
# ============================================================
- name: Remove rendered Ingress temp files
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/opensearch-ingress.yaml
    - /tmp/grafana-ingress.yaml
    - /tmp/forgejo-ingress.yaml

# ============================================================
# 7. Print Final Access Summary
# ============================================================
- name: Print framework access summary
  ansible.builtin.debug:
    msg:
      - "=============================================="
      - " Observability Framework — Access Summary"
      - "=============================================="
      - ""
      - " Add to /etc/hosts on your host machine:"
      - " {{ master_ip }}  {{ ingress.forgejo_host }}"
      - " {{ master_ip }}  {{ ingress.grafana_host }}"
      - " {{ master_ip }}  {{ ingress.opensearch_host }}"
      - ""
      - " Service URLs:"
      - " Forgejo    → http://{{ ingress.forgejo_host }}"
      - " Grafana    → http://{{ ingress.grafana_host }}"
      - " OpenSearch → http://{{ ingress.opensearch_host }}"
      - "=============================================="