---
# ============================================================
# ROLE: ingress
# Creates Traefik Ingress resources for framework services
# that are deployed before Phase 8:
#   - OpenSearch Dashboards (Phase 5)
#   - Grafana               (Phase 6)
#   - Prometheus            (Phase 6)
#
# NOTE: Forgejo and WeKan Ingress resources are created by
# their app roles after their namespaces exist.
#
# Required /etc/hosts entries on host machine:
#   192.168.56.10  forgejo.local
#   192.168.56.10  wekan.local
#   192.168.56.10  grafana.local
#   192.168.56.10  prometheus.local
#   192.168.56.10  opensearch.local
# ============================================================

# ============================================================
# 1. Verify Traefik is Running
# ============================================================
- name: Verify Traefik ingress controller deployment is available
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.command:
    argv:
      - kubectl
      - wait
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - --namespace
      - kube-system
      - --for=condition=Available
      - --timeout=300s
      - deployment
      - -l
      - app.kubernetes.io/name=traefik
  register: traefik_status
  changed_when: false

- name: Show Traefik status
  ansible.builtin.debug:
    msg: "Traefik ingress controller availability check: {{ traefik_status.stdout }}"

# ============================================================
# 2. Render Templates to Control Plane
# ============================================================
- name: Render OpenSearch Dashboards Ingress template
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    content: "{{ lookup('template', 'opensearch-ingress.yaml.j2') }}"
    dest: /tmp/opensearch-ingress.yaml
    mode: '0644'

- name: Render Grafana Ingress template
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    content: "{{ lookup('template', 'grafana-ingress.yaml.j2') }}"
    dest: /tmp/grafana-ingress.yaml
    mode: '0644'

- name: Render Prometheus Ingress template
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    content: "{{ lookup('template', 'prometheus-ingress.yaml.j2') }}"
    dest: /tmp/prometheus-ingress.yaml
    mode: '0644'

# ============================================================
# 3. Apply Ingress Resources
# ============================================================

# Exposes: http://opensearch.local
- name: Apply OpenSearch Dashboards Ingress
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl apply \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -f /tmp/opensearch-ingress.yaml
  register: opensearch_ingress_result
  changed_when: "'created' in opensearch_ingress_result.stdout or
                 'configured' in opensearch_ingress_result.stdout"

- name: Show OpenSearch Ingress apply result
  ansible.builtin.debug:
    msg: "{{ opensearch_ingress_result.stdout }}"

# Exposes: http://grafana.local
- name: Apply Grafana Ingress
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl apply \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -f /tmp/grafana-ingress.yaml
  register: grafana_ingress_result
  changed_when: "'created' in grafana_ingress_result.stdout or
                 'configured' in grafana_ingress_result.stdout"

- name: Show Grafana Ingress apply result
  ansible.builtin.debug:
    msg: "{{ grafana_ingress_result.stdout }}"

# Exposes: http://prometheus.local
- name: Apply Prometheus Ingress
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl apply \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -f /tmp/prometheus-ingress.yaml
  register: prometheus_ingress_result
  changed_when: "'created' in prometheus_ingress_result.stdout or
                 'configured' in prometheus_ingress_result.stdout"

- name: Show Prometheus Ingress apply result
  ansible.builtin.debug:
    msg: "{{ prometheus_ingress_result.stdout }}"

# ============================================================
# 4. Verify Ingress Resources Were Created
# ============================================================
- name: Verify Ingress resources exist
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get ingress \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      --all-namespaces \
      -o wide
  register: ingress_summary
  changed_when: false

- name: Print Ingress summary
  ansible.builtin.debug:
    var: ingress_summary.stdout_lines

# ============================================================
# 5. Verify Grafana, Prometheus and OpenSearch are Reachable
# ============================================================
- name: Verify Grafana is reachable through Ingress
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    curl -sk \
      -o /dev/null \
      -w "%{http_code}" \
      -H "Host: {{ ingress.grafana_host }}" \
      http://{{ master_ip }}/
  register: grafana_http_check
  until: grafana_http_check.stdout in ['200', '302']
  retries: 20
  delay: 10
  changed_when: false

- name: Show Grafana HTTP response code
  ansible.builtin.debug:
    msg: "Grafana via Ingress → HTTP {{ grafana_http_check.stdout }}"

- name: Verify Prometheus is reachable through Ingress
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    curl -sk \
      -o /dev/null \
      -w "%{http_code}" \
      -H "Host: {{ ingress.prometheus_host }}" \
      http://{{ master_ip }}/
  register: prometheus_http_check
  until: prometheus_http_check.stdout in ['200', '302']
  retries: 20
  delay: 10
  changed_when: false

- name: Show Prometheus HTTP response code
  ansible.builtin.debug:
    msg: "Prometheus via Ingress → HTTP {{ prometheus_http_check.stdout }}"

- name: Verify OpenSearch Dashboards is reachable through Ingress
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    curl -sk \
      -o /dev/null \
      -w "%{http_code}" \
      -H "Host: {{ ingress.opensearch_host }}" \
      http://{{ master_ip }}/
  register: opensearch_http_check
  until: opensearch_http_check.stdout in ['200', '302']
  retries: 20
  delay: 10
  changed_when: false

- name: Show OpenSearch Dashboards HTTP response code
  ansible.builtin.debug:
    msg: "OpenSearch Dashboards via Ingress → HTTP {{ opensearch_http_check.stdout }}"

# ============================================================
# 6. Cleanup Temp Files
# ============================================================
- name: Remove rendered Ingress temp files
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/opensearch-ingress.yaml
    - /tmp/grafana-ingress.yaml
    - /tmp/prometheus-ingress.yaml
