---
# ============================================================
# ROLE: ai_engine
# Deploys a lightweight anomaly detection service built with
# PyOD. The service runs on the configured AI pool, queries
# Prometheus for
# cluster health signals, writes anomaly events to OpenSearch,
# and exposes its own Prometheus metrics for Grafana.
#
# Depends on:
#   - logging    (OpenSearch must exist)
#   - monitoring (Prometheus/Grafana must exist)
#   - k3s_worker (AI pool label/taint must exist)
# ============================================================

- name: Create AI engine namespace
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ ai_engine.namespace }}"

- name: Resolve Docker CLI path for local AI image build
  become: false
  delegate_to: localhost
  ansible.builtin.shell: |
    for candidate in docker /opt/homebrew/bin/docker /usr/local/bin/docker /usr/bin/docker; do
      if command -v "$candidate" >/dev/null 2>&1; then
        command -v "$candidate"
        exit 0
      fi
      if [ -x "$candidate" ]; then
        printf '%s\n' "$candidate"
        exit 0
      fi
    done
    echo "Docker CLI not found on localhost" >&2
    exit 1
  args:
    executable: /bin/sh
  register: ai_engine_docker_cli
  changed_when: false
  when: ai_engine.build.enabled | bool

- name: Build pinned AI engine image locally
  become: false
  delegate_to: localhost
  ansible.builtin.command:
    argv:
      - "{{ ai_engine_docker_cli.stdout }}"
      - build
      - --platform
      - "{{ ai_engine.build.platform }}"
      - -t
      - "{{ ai_engine.image.repository }}:{{ ai_engine.image.tag }}"
      - .
    chdir: "{{ role_path }}/files/app"
  register: ai_engine_image_build
  changed_when: true
  when: ai_engine.build.enabled | bool

- name: Export AI engine image archive locally
  become: false
  delegate_to: localhost
  ansible.builtin.command:
    argv:
      - "{{ ai_engine_docker_cli.stdout }}"
      - save
      - -o
      - "{{ ai_engine.build.archive_path }}"
      - "{{ ai_engine.image.repository }}:{{ ai_engine.image.tag }}"
  changed_when: true
  when: ai_engine.build.enabled | bool

- name: Copy AI engine image archive to AI pool nodes
  become: true
  delegate_to: "{{ item }}"
  ansible.builtin.copy:
    src: "{{ ai_engine.build.archive_path }}"
    dest: "{{ ai_engine.build.archive_path }}"
    mode: '0644'
  loop: "{{ groups[cluster_topology.pool_group_prefix ~ ai_engine.pool] }}"
  when: ai_engine.build.enabled | bool

- name: Import AI engine image into K3s container runtime
  become: true
  delegate_to: "{{ item }}"
  ansible.builtin.command:
    argv:
      - k3s
      - ctr
      - -n
      - k8s.io
      - images
      - import
      - "{{ ai_engine.build.archive_path }}"
  loop: "{{ groups[cluster_topology.pool_group_prefix ~ ai_engine.pool] }}"
  changed_when: true
  when: ai_engine.build.enabled | bool

- name: Remove AI engine image archive from AI pool nodes
  become: true
  delegate_to: "{{ item }}"
  ansible.builtin.file:
    path: "{{ ai_engine.build.archive_path }}"
    state: absent
  loop: "{{ groups[cluster_topology.pool_group_prefix ~ ai_engine.pool] }}"
  when: ai_engine.build.enabled | bool

- name: Remove local AI engine image archive
  become: false
  delegate_to: localhost
  ansible.builtin.file:
    path: "{{ ai_engine.build.archive_path }}"
    state: absent
  when: ai_engine.build.enabled | bool

- name: Create AI engine secret
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: ai-engine-secret
        namespace: "{{ ai_engine.namespace }}"
      type: Opaque
      stringData:
        OPENSEARCH_USERNAME: "admin"
        OPENSEARCH_PASSWORD: "{{ opensearch.admin_password }}"
  no_log: true

- name: Deploy AI engine workload
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'deployment.yaml.j2') | from_yaml }}"

- name: Deploy AI engine service
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'service.yaml.j2') | from_yaml }}"

- name: Deploy AI engine ServiceMonitor
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'servicemonitor.yaml.j2') | from_yaml }}"

- name: Wait for AI engine pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl wait \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n {{ ai_engine.namespace }} \
      --for=condition=Ready \
      pod \
      -l app.kubernetes.io/name={{ ai_engine.app_name }} \
      --timeout=600s
  register: ai_engine_status
  changed_when: false

- name: Render OpenSearch anomaly index template
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    content: "{{ lookup('template', 'opensearch-index-template.json.j2') }}"
    dest: /tmp/ai-anomalies-index-template.json
    mode: '0644'

- name: Look up OpenSearch service ClusterIP
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get svc \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n opensearch \
      opensearch-cluster-master \
      -o jsonpath='{.spec.clusterIP}'
  register: opensearch_service_ip
  changed_when: false

- name: Apply OpenSearch anomaly index template
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.command:
    argv:
      - curl
      - -sS
      - -f
      - -k
      - -u
      - "admin:{{ opensearch.admin_password }}"
      - -H
      - "Content-Type: application/json"
      - -X
      - PUT
      - "https://{{ opensearch_service_ip.stdout }}:9200/_index_template/ai-anomalies-template"
      - --data-binary
      - "@/tmp/ai-anomalies-index-template.json"
  register: ai_index_template_result
  until: ai_index_template_result.rc == 0 and '\"acknowledged\":true' in (ai_index_template_result.stdout | replace(' ', ''))
  retries: 30
  delay: 10
  changed_when: "'\"acknowledged\":true' in (ai_index_template_result.stdout | replace(' ', ''))"
  failed_when: false
  no_log: true

- name: Show OpenSearch anomaly index template result
  ansible.builtin.debug:
    var: ai_index_template_result.stdout

- name: Create Grafana AI anomaly dashboard ConfigMap
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'grafana-dashboard-configmap.yaml.j2') | from_yaml }}"

- name: Look up AI engine service ClusterIP
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get svc \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n {{ ai_engine.namespace }} \
      {{ ai_engine.app_name }} \
      -o jsonpath='{.spec.clusterIP}'
  register: ai_engine_service_ip
  changed_when: false

- name: Verify AI engine metrics endpoint
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.command:
    argv:
      - curl
      - -sS
      - -f
      - "http://{{ ai_engine_service_ip.stdout }}:{{ ai_engine.port }}/metrics"
  register: ai_metrics_check
  until: ai_metrics_check.rc == 0 and 'ai_anomaly_runs_total' in ai_metrics_check.stdout
  retries: 30
  delay: 10
  changed_when: false
  failed_when: false

- name: Show AI engine metrics verification
  ansible.builtin.debug:
    var: ai_metrics_check.stdout

- name: Show AI engine pod summary
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n {{ ai_engine.namespace }} \
      -o wide
  register: ai_engine_pods
  changed_when: false

- name: Print AI engine pod summary
  ansible.builtin.debug:
    var: ai_engine_pods.stdout_lines

- name: Remove temporary AI index template file
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.file:
    path: /tmp/ai-anomalies-index-template.json
    state: absent
