---
# ============================================================
# ROLE: k3s_worker
# Joins worker nodes to the K3s cluster, labels them,
# taints them for workload isolation and verifies
# cluster networking is healthy after all nodes join.
# ============================================================

# ============================================================
# 1. Join Worker Node to Cluster
# ============================================================
- name: Ensure K3s config directory exists on worker
  become: true
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: '0700'

- name: Download pinned K3s binary for worker
  become: true
  vars:
    k3s_binary_asset: >-
      {% if ansible_architecture in ['x86_64', 'amd64'] %}k3s{% elif ansible_architecture in ['aarch64', 'arm64'] %}k3s-arm64{% else %}k3s{% endif %}
    k3s_download_path: "/tmp/k3s-{{ k3s_version }}"
  block:
    - name: Check installed K3s version on worker
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - --version
      register: k3s_agent_version
      changed_when: false
      failed_when: false

    - name: Download pinned K3s binary for worker with curl
      ansible.builtin.command:
        argv:
          - curl
          - -fsSL
          - "https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/{{ k3s_binary_asset }}"
          - -o
          - "{{ k3s_download_path }}"
      when: k3s_agent_version.rc != 0 or k3s_version not in k3s_agent_version.stdout

    - name: Install pinned K3s binary on worker
      ansible.builtin.command:
        argv:
          - install
          - -m
          - "0755"
          - "{{ k3s_download_path }}"
          - /usr/local/bin/k3s
      register: k3s_agent_binary
      when: k3s_agent_version.rc != 0 or k3s_version not in k3s_agent_version.stdout

    - name: Mark K3s binary unchanged when pinned version already present on worker
      ansible.builtin.set_fact:
        k3s_agent_binary:
          changed: false
      when: k3s_agent_version.rc == 0 and k3s_version in k3s_agent_version.stdout

- name: Ensure kubectl symlink points to pinned K3s binary on worker
  become: true
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link

- name: Render pinned K3s agent config
  become: true
  ansible.builtin.template:
    src: k3s-agent-config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: '0600'
  register: k3s_agent_config
  no_log: true

- name: Install K3s agent systemd service
  become: true
  ansible.builtin.template:
    src: k3s-agent.service.j2
    dest: /etc/systemd/system/k3s-agent.service
    mode: '0644'
  register: k3s_agent_service

- name: Start and enable K3s agent service
  become: true
  ansible.builtin.systemd:
    name: k3s-agent
    enabled: true
    daemon_reload: true
    state: "{{ 'restarted' if (k3s_agent_binary.changed or k3s_agent_config.changed or k3s_agent_service.changed) else 'started' }}"

# ============================================================
# 2. Resolve Worker Pool Metadata
# Worker placement is now driven by inventory node_pool
# assignments and shared cluster_topology definitions.
# ============================================================
- name: Resolve worker pool name for this node
  ansible.builtin.set_fact:
    worker_pool_name: "{{ hostvars[inventory_hostname].node_pool | default(hostvars[inventory_hostname].role | default(cluster_topology.default_worker_pool)) }}"

- name: Resolve worker pool configuration for this node
  ansible.builtin.set_fact:
    worker_pool_config: "{{ cluster_topology.node_pools[worker_pool_name] }}"

# ============================================================
# 3. Label Node With Pool Metadata
# ============================================================
- name: Label node with workload and pool metadata
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.command:
    argv:
      - kubectl
      - label
      - node
      - "{{ inventory_hostname }}"
      - "observability.framework/pool={{ worker_pool_name }}"
      - "workload={{ worker_pool_config.workload_label }}"
      - "kubernetes.io/role=worker"
      - --overwrite
      - --kubeconfig=/etc/rancher/k3s/k3s.yaml
  register: label_result
  changed_when: "'not labeled' not in label_result.stdout"

# ============================================================
# 4. Wait for All Workers to Be Ready
# Before tainting we must confirm every worker node has
# joined and is in Ready state — otherwise kubectl taint
# will fail on nodes that have not appeared yet.
# run_once means this check runs one time total, not
# once per worker, since it checks all nodes together.
# ============================================================
- name: Wait for all worker nodes to be Ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get nodes --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -o jsonpath='{range .items[*]}{.metadata.name}{" "}{.status.conditions[-1].type}{" "}{.status.conditions[-1].status}{"\n"}{end}' \
    | grep -v "Ready True" | grep -v "k8s-ctrl" | wc -l
  register: not_ready_count
  until: not_ready_count.stdout | int == 0
  retries: 30
  delay: 10
  changed_when: false
  run_once: true

# ============================================================
# 5. Taint Control-Plane and Worker Nodes for Isolation
# The control-plane taint is applied here, not during the
# single-node bootstrap phase, so K3s addon installer jobs
# like helm-install-traefik can still schedule cleanly on
# a fresh cluster before workers exist.
#
# Each node gets the taints defined by its configured pool.
# Pods must have a matching toleration + nodeSelector
# to be scheduled on a tainted node.
# run_once so taints are applied once after all workers join.
# ============================================================
- name: Taint control-plane nodes after workers join
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.command:
    argv:
      - kubectl
      - taint
      - nodes
      - "{{ item.0 }}"
      - "{{ item.1.key }}={{ item.1.value }}:{{ item.1.effect }}"
      - --overwrite
      - --kubeconfig=/etc/rancher/k3s/k3s.yaml
  loop: "{{ query('nested', groups['master'], cluster_topology.node_pools[cluster_topology.control_plane_pool].taints | default([])) }}"
  run_once: true
  changed_when: false

- name: Build worker taint plan from pool definitions
  ansible.builtin.set_fact:
    worker_taint_plan: "{{ (worker_taint_plan | default([])) + [{'hostname': item, 'pool': resolved_pool, 'taints': cluster_topology.node_pools[resolved_pool].taints | default([])}] }}"
  vars:
    resolved_pool: "{{ hostvars[item].node_pool | default(hostvars[item].role | default(cluster_topology.default_worker_pool)) }}"
  loop: "{{ groups['workers'] }}"
  run_once: true

- name: Taint worker nodes for workload isolation
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.command:
    argv:
      - kubectl
      - taint
      - nodes
      - "{{ item.0.hostname }}"
      - "{{ item.1.key }}={{ item.1.value }}:{{ item.1.effect }}"
      - --overwrite
      - --kubeconfig=/etc/rancher/k3s/k3s.yaml
  loop: "{{ query('subelements', worker_taint_plan, 'taints', {'skip_missing': True}) }}"
  run_once: true
  changed_when: false

# ============================================================
# 6. Verify Database Pool Can Reach K3s API Server
# Confirms flannel routing is healthy after iptables fix
# was applied in the common role during Phase 1.
# If this fails it means pod-to-pod traffic will be broken
# which would cause CNPG replication to fail later.
# ============================================================
- name: Verify database pool can reach K3s API server
  become: true
  delegate_to: "{{ groups[cluster_topology.pool_group_prefix ~ database.pool] | first }}"
  ansible.builtin.shell: |
    curl -sk https://{{ master_ip }}:6443/healthz
  register: api_reach
  changed_when: false
  failed_when: api_reach.rc != 0 or api_reach.stdout | trim != "ok"
  run_once: true

- name: Show API reachability from database pool
  ansible.builtin.debug:
    msg: "{{ groups[cluster_topology.pool_group_prefix ~ database.pool] | first }} -> API server: {{ api_reach.stdout }}"
  run_once: true

# ============================================================
# 7. Show Final Cluster Node State
# Prints a summary of all nodes, their roles, taints
# and ready status so you can confirm the cluster is
# healthy before Phase 4 workloads are deployed.
# ============================================================
- name: Show cluster node summary
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get nodes \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -o wide
  register: node_summary
  changed_when: false
  run_once: true

- name: Print cluster node summary
  ansible.builtin.debug:
    var: node_summary.stdout_lines
  run_once: true
