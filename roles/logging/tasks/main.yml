---
# ============================================================
# ROLE: logging
# Deploys the full logging stack:
#   - OpenSearch        (log storage + search)
#   - OpenSearch Dashboards (log visualization UI)
#   - Fluent-bit        (log collector DaemonSet)
#
# OpenSearch components are pinned to the configured logging pool.
# Service type is ClusterIP — Ingress handles routing.
#
# Depends on:
#   - common role (Helm installed + repos added)
#   - k3s_master + k3s_worker (cluster must be healthy)
# ============================================================

# ============================================================
# 1. Deploy OpenSearch
# ============================================================
- name: Deploy OpenSearch via Helm
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: opensearch
    chart_ref: opensearch/opensearch
    chart_version: "{{ artifact_versions.charts.opensearch }}"
    release_namespace: opensearch
    create_namespace: true
    wait: yes
    timeout: 1500s
    values:
      persistence:
        enabled: true
        storageClass: "{{ storage.storage_class }}"
      singleNode: true
      securityConfig:
        enabled: true
      extraEnvs:
        - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
          value: "{{ opensearch.admin_password }}"
        - name: node.store.allow_mmap
          value: "false"
        - name: OPENSEARCH_JAVA_OPTS
          value: "-Xmx{{ opensearch.heap_size }} -Xms{{ opensearch.heap_size }}"
      nodeSelector:
        workload: "{{ cluster_topology.node_pools[opensearch.pool].workload_label }}"
      tolerations:
        - key:      "workload"
          operator: "Equal"
          value:    "{{ cluster_topology.node_pools[opensearch.pool].workload_label }}"
          effect:   "{{ cluster_topology.node_pools[opensearch.pool].taints[0].effect }}"
      resources:
        limits:
          memory: 1Gi
        requests:
          memory: 768Mi
      startupProbe:
        tcpSocket:
          port: 9200
        initialDelaySeconds: 180
        periodSeconds:       10
        failureThreshold:    60
  no_log: true

# ============================================================
# 2. Wait for OpenSearch to Be Ready
# Dashboards and Fluent-bit both depend on OpenSearch
# being fully up before they start — without this check
# they will fail their initial connection attempts.
# ============================================================
- name: Wait for OpenSearch pod Ready condition
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.command:
    argv:
      - kubectl
      - wait
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - --namespace
      - opensearch
      - --for=condition=Ready
      - --timeout=900s
      - pod
      - -l
      - app.kubernetes.io/name=opensearch
  register: opensearch_status
  changed_when: false

# ============================================================
# 3. Deploy OpenSearch Dashboards
# ============================================================
- name: Deploy OpenSearch Dashboards via Helm
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: opensearch-dashboards
    chart_ref: opensearch/opensearch-dashboards
    chart_version: "{{ artifact_versions.charts.opensearch_dashboards }}"
    release_namespace: opensearch
    wait: yes
    values:
      opensearchHosts: "https://opensearch-cluster-master:9200"
      config:
        opensearch_dashboards.yml:
          server.host: "0.0.0.0"
          opensearch.ssl.verificationMode: none
          opensearch.username: "admin"
          opensearch.password: "{{ opensearch.admin_password }}"
      # ClusterIP — Ingress role handles external routing
      service:
        type: ClusterIP
        port: "{{ opensearch_dashboards_port }}"
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 300m
          memory: 512Mi
      nodeSelector:
        workload: "{{ cluster_topology.node_pools[opensearch.pool].workload_label }}"
      tolerations:
        - key:      "workload"
          operator: "Equal"
          value:    "{{ cluster_topology.node_pools[opensearch.pool].workload_label }}"
          effect:   "{{ cluster_topology.node_pools[opensearch.pool].taints[0].effect }}"
  no_log: true

# ============================================================
# 4. Deploy Fluent-bit
# Runs as a DaemonSet on all nodes — collects logs from
# every pod and ships them to OpenSearch.
# tolerations with operator Exists ensures it runs on
# all nodes regardless of their workload taints.
# ============================================================
- name: Deploy Fluent-bit via Helm
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: fluent-bit
    chart_ref: fluent/fluent-bit
    chart_version: "{{ artifact_versions.charts.fluent_bit }}"
    release_namespace: opensearch
    wait: yes
    values:
      metricsPort: 2020
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      config:
        outputs: |
          [OUTPUT]
              Name  es
              Match *
              Host  opensearch-cluster-master.opensearch.svc.cluster.local
              Port  9200
              HTTP_User admin
              HTTP_Passwd {{ opensearch.admin_password }}
              tls On
              tls.verify Off
              Index fluent-bit
              Suppress_Type_Name On
      tolerations:
        - operator: "Exists"
          effect:   "NoSchedule"
  no_log: true

# ============================================================
# 5. Verify OpenSearch is Healthy
# A direct curl against the ClusterIP is more reliable than
# kubectl exec and avoids kubelet proxy issues on reruns.
# ============================================================
- name: Look up OpenSearch service ClusterIP
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get svc \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n opensearch \
      opensearch-cluster-master \
      -o jsonpath='{.spec.clusterIP}'
  register: opensearch_service_ip
  changed_when: false

- name: Verify OpenSearch is accepting connections
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.command:
    argv:
      - curl
      - -sS
      - -k
      - -u
      - "admin:{{ opensearch.admin_password }}"
      - "https://{{ opensearch_service_ip.stdout }}:9200/_cluster/health"
  register: opensearch_health
  until: >-
    opensearch_health.rc == 0
    and (
      '\"status\":\"green\"' in (opensearch_health.stdout | replace(' ', ''))
      or '\"status\":\"yellow\"' in (opensearch_health.stdout | replace(' ', ''))
    )
  retries: 20
  delay: 15
  changed_when: false
  no_log: true

- name: Show OpenSearch cluster health
  ansible.builtin.debug:
    msg: "{{ opensearch_health.stdout }}"

# ============================================================
# 6. Expose Fluent Bit Metrics
# Fluent Bit already exposes internal metrics on port 2020;
# we add a stable Service here, and the monitoring role creates
# the ServiceMonitor later after Prometheus Operator CRDs exist.
# ============================================================
- name: Create Fluent Bit metrics service
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'fluent-bit-metrics-service.yaml.j2') | from_yaml }}"

- name: Wait for Fluent Bit metrics endpoints to exist
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get endpoints \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n opensearch \
      fluent-bit-metrics \
      -o jsonpath='{.subsets[*].addresses[*].ip}'
  register: fluent_bit_metrics_endpoints
  until: fluent_bit_metrics_endpoints.stdout | trim | length > 0
  retries: 30
  delay: 10
  changed_when: false

# ============================================================
# 7. Deploy and Scrape OpenSearch Exporter
# A separate exporter keeps the OpenSearch StatefulSet stock
# and makes the framework reusable across environments.
# ============================================================
- name: Create OpenSearch exporter secret
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'opensearch-exporter-secret.yaml.j2') | from_yaml }}"
  no_log: true

- name: Deploy OpenSearch exporter
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'opensearch-exporter-deployment.yaml.j2') | from_yaml }}"

- name: Create OpenSearch exporter service
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'opensearch-exporter-service.yaml.j2') | from_yaml }}"

- name: Wait for OpenSearch exporter deployment to become available
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl rollout status \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n opensearch \
      deployment/opensearch-exporter \
      --timeout=300s
  register: opensearch_exporter_rollout
  changed_when: false

# ============================================================
# 8. Show Logging Stack Pod Summary
# ============================================================
- name: Show logging stack pod summary
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n opensearch \
      -o wide
  register: logging_pods
  changed_when: false

- name: Print logging stack pod summary
  ansible.builtin.debug:
    var: logging_pods.stdout_lines
