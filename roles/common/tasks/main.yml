---
# ============================================================
# ROLE: common
# Runs on ALL nodes in Phase 1 — before K3s is installed.
# Only OS-level tasks here. No kubectl or helm cluster
# commands — the cluster does not exist yet at this phase.
# ============================================================

# ============================================================
# 1. Preflight Secret Validation
# Fail early if placeholder or known demo credentials are
# still in use. This keeps the framework from silently
# deploying with insecure defaults.
# ============================================================
- name: Validate secret inputs before continuing
  ansible.builtin.fail:
    msg: >-
      {{ item.label }} is missing, too short, or still using a placeholder/demo
      value. Set it in inventory/group_vars/all/secrets.yml and re-run.
  vars:
    secret_value: "{{ vars[item.variable] | default('') | string | trim }}"
    secret_is_invalid: >-
      {{
        (secret_value | length < item.min_length)
        or (secret_value is match('^replace-with-'))
        or (secret_value in item.forbidden_values)
      }}
  loop:
    - label: K3s cluster token
      variable: vault_k3s_token
      min_length: 16
      forbidden_values:
        - "SuperSecretTokenForK3sClusterJoin123!"
    - label: OpenSearch admin password
      variable: vault_opensearch_admin_password
      min_length: 12
      forbidden_values:
        - "S#r2-L%m4!"
    - label: Grafana admin password
      variable: vault_grafana_admin_password
      min_length: 12
      forbidden_values:
        - "admin"
    - label: PostgreSQL superuser password
      variable: vault_database_superuser_password
      min_length: 12
      forbidden_values:
        - "SuperuserPassword123!"
    - label: PostgreSQL application password
      variable: vault_database_app_password
      min_length: 12
      forbidden_values:
        - "appuserpassword"
    - label: Forgejo admin password
      variable: vault_forgejo_admin_password
      min_length: 12
      forbidden_values:
        - "Strong_AdminPassword123!"
  loop_control:
    label: "{{ item.label }}"
  when: secret_is_invalid | bool
  run_once: true

# ============================================================
# 2. Preflight Topology Validation
# ============================================================
- name: Validate host node_pool assignments
  ansible.builtin.fail:
    msg: >-
      Host {{ inventory_hostname }} uses node_pool='{{ resolved_node_pool }}',
      but that pool is not defined in cluster_topology.node_pools.
  vars:
    resolved_node_pool: "{{ hostvars[inventory_hostname].node_pool | default(hostvars[inventory_hostname].role | default(cluster_topology.default_worker_pool)) }}"
  when: resolved_node_pool not in cluster_topology.node_pools

- name: Validate required workload pools exist in inventory
  ansible.builtin.fail:
    msg: >-
      Required pool '{{ item.pool }}' has no hosts in inventory group
      '{{ cluster_topology.pool_group_prefix ~ item.pool }}'.
      Add at least one host to that pool before deploying {{ item.workload }}.
  loop:
    - workload: Forgejo and general application workloads
      pool: "{{ forgejo.pool }}"
    - workload: CloudNativePG
      pool: "{{ database.pool }}"
    - workload: OpenSearch and logging
      pool: "{{ opensearch.pool }}"
    - workload: monitoring stack
      pool: "{{ monitoring.pool }}"
    - workload: AI engine
      pool: "{{ ai_engine.pool }}"
  loop_control:
    label: "{{ item.pool }}"
  when: (groups[cluster_topology.pool_group_prefix ~ item.pool] | default([]) | length) == 0
  run_once: true

# ============================================================
# 3. Kernel Parameters
# ============================================================
- name: Set Linux kernel parameter vm.max_map_count
  become: true
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present
    reload: yes

# ============================================================
# 4. Disable Swap (Kubernetes requirement)
# ============================================================
- name: Disable swap immediately
  become: true
  ansible.builtin.command: swapoff -a
  when: ansible_swaptotal_mb > 0

- name: Remove swap entry from /etc/fstab
  become: true
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s)'
    replace: '# \1'

# ============================================================
# 5. Package Management
# ============================================================
- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: yes
  when: ansible_os_family == 'Debian'

- name: Install required packages
  become: true
  ansible.builtin.apt:
    name:
      - curl
      - nfs-common
      - tar
      - python3-pip
      # iptables required for flannel networking and
      # CNPG replication connectivity between nodes
      - iptables
      - iptables-persistent
    state: present
  when: ansible_os_family == 'Debian'

# ============================================================
# 6. System Configuration
# ============================================================
- name: Set system timezone
  become: true
  ansible.builtin.timezone:
    name: "{{ system_timezone }}"

- name: Ensure python3-kubernetes is installed via pip
  become: true
  ansible.builtin.pip:
    name: "kubernetes=={{ artifact_versions.python_kubernetes }}"
    executable: pip3

# ============================================================
# 6. Network — Fix iptables FORWARD chain
# Must run on ALL nodes before K3s starts.
# Without this, flannel pod-to-pod traffic is dropped which
# breaks CNPG replication and API server connectivity.
# ============================================================
- name: Fix iptables FORWARD chain on all nodes
  become: true
  ansible.builtin.iptables:
    chain: FORWARD
    policy: ACCEPT

# ============================================================
# 7. Install Helm (master node only)
# Safe to install before cluster exists — it is just
# a client binary that talks to the cluster later.
# ============================================================
- name: Install Helm on master node
  become: true
  vars:
    helm_platform_arch: >-
      {% if ansible_architecture in ['x86_64', 'amd64'] %}amd64{% elif ansible_architecture in ['aarch64', 'arm64'] %}arm64{% else %}amd64{% endif %}
    helm_archive_name: "helm-{{ artifact_versions.helm }}-{{ ansible_system | lower }}-{{ helm_platform_arch }}.tar.gz"
    helm_download_url: "https://get.helm.sh/{{ helm_archive_name }}"
    helm_extract_root: "/tmp/helm-{{ artifact_versions.helm }}"
  block:
    - name: Check installed Helm version
      ansible.builtin.command:
        argv:
          - /usr/local/bin/helm
          - version
          - --short
      register: helm_version_check
      changed_when: false
      failed_when: false

    - name: Download pinned Helm archive with curl
      ansible.builtin.command:
        argv:
          - curl
          - -fsSL
          - "{{ helm_download_url }}"
          - -o
          - "/tmp/{{ helm_archive_name }}"
      when: helm_version_check.rc != 0 or artifact_versions.helm not in helm_version_check.stdout

    - name: Ensure Helm extraction directory exists
      ansible.builtin.file:
        path: "{{ helm_extract_root }}"
        state: directory
        mode: '0755'
      when: helm_version_check.rc != 0 or artifact_versions.helm not in helm_version_check.stdout

    - name: Extract pinned Helm archive
      ansible.builtin.unarchive:
        src: "/tmp/{{ helm_archive_name }}"
        dest: "{{ helm_extract_root }}"
        remote_src: true
        creates: "{{ helm_extract_root }}/{{ ansible_system | lower }}-{{ helm_platform_arch }}/helm"
      when: helm_version_check.rc != 0 or artifact_versions.helm not in helm_version_check.stdout

    - name: Install pinned Helm binary
      ansible.builtin.copy:
        src: "{{ helm_extract_root }}/{{ ansible_system | lower }}-{{ helm_platform_arch }}/helm"
        dest: /usr/local/bin/helm
        mode: '0755'
        remote_src: true
      when: helm_version_check.rc != 0 or artifact_versions.helm not in helm_version_check.stdout
  when: inventory_hostname in groups['master']

# ============================================================
# 8. Add Helm repos (master node only)
# Repos are just client-side config — no cluster needed.
# They will be available immediately when cluster is ready.
# ============================================================
- name: Add required Helm repositories
  become: true
  kubernetes.core.helm_repository:
    name: "{{ item.name }}"
    repo_url: "{{ item.repo_url }}"
    force_update: true
    state: present
  loop:
    - name: opensearch
      repo_url: https://opensearch-project.github.io/helm-charts/
    - name: prometheus-community
      repo_url: https://prometheus-community.github.io/helm-charts
    - name: cnpg
      repo_url: https://cloudnative-pg.github.io/charts
    - name: fluent
      repo_url: https://fluent.github.io/helm-charts
  when: inventory_hostname in groups['master']
