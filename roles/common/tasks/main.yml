---
# ============================================================
# ROLE: common
# Runs on ALL nodes in Phase 1 — before K3s is installed.
# Only OS-level tasks here. No kubectl or helm cluster
# commands — the cluster does not exist yet at this phase.
# ============================================================

# ============================================================
# 1. Preflight Secret Validation
# Fail early if placeholder or known demo credentials are
# still in use. This keeps the framework from silently
# deploying with insecure defaults.
# ============================================================
- name: Validate secret inputs before continuing
  ansible.builtin.assert:
    that:
      - secret_value | length >= item.min_length
      - not secret_value.startswith('replace-with-')
      - secret_value not in item.forbidden_values
    fail_msg: >-
      {{ item.label }} is missing, too short, or still using a placeholder/demo
      value. Set it in inventory/group_vars/all/secrets.yml and re-run.
    quiet: true
  vars:
    secret_value: "{{ vars[item.variable] | default('') | string | trim }}"
  loop:
    - label: K3s cluster token
      variable: vault_k3s_token
      min_length: 16
      forbidden_values:
        - "SuperSecretTokenForK3sClusterJoin123!"
    - label: OpenSearch admin password
      variable: vault_opensearch_admin_password
      min_length: 12
      forbidden_values:
        - "S#r2-L%m4!"
    - label: Grafana admin password
      variable: vault_grafana_admin_password
      min_length: 12
      forbidden_values:
        - "admin"
    - label: PostgreSQL superuser password
      variable: vault_database_superuser_password
      min_length: 12
      forbidden_values:
        - "SuperuserPassword123!"
    - label: PostgreSQL application password
      variable: vault_database_app_password
      min_length: 12
      forbidden_values:
        - "appuserpassword"
    - label: Forgejo admin password
      variable: vault_forgejo_admin_password
      min_length: 12
      forbidden_values:
        - "Strong_AdminPassword123!"
  run_once: true
  no_log: true

# ============================================================
# 2. Kernel Parameters
# ============================================================
- name: Set Linux kernel parameter vm.max_map_count
  become: true
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present
    reload: yes

# ============================================================
# 3. Disable Swap (Kubernetes requirement)
# ============================================================
- name: Disable swap immediately
  become: true
  ansible.builtin.command: swapoff -a
  when: ansible_swaptotal_mb > 0

- name: Remove swap entry from /etc/fstab
  become: true
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s)'
    replace: '# \1'

# ============================================================
# 4. Package Management
# ============================================================
- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: yes
  when: ansible_os_family == 'Debian'

- name: Install required packages
  become: true
  ansible.builtin.apt:
    name:
      - curl
      - nfs-common
      - tar
      - python3-pip
      # iptables required for flannel networking and
      # CNPG replication connectivity between nodes
      - iptables
      - iptables-persistent
    state: present
  when: ansible_os_family == 'Debian'

# ============================================================
# 5. System Configuration
# ============================================================
- name: Set system timezone
  become: true
  ansible.builtin.timezone:
    name: "{{ system_timezone }}"

- name: Ensure python3-kubernetes is installed via pip
  become: true
  ansible.builtin.pip:
    name: kubernetes
    executable: pip3

# ============================================================
# 6. Network — Fix iptables FORWARD chain
# Must run on ALL nodes before K3s starts.
# Without this, flannel pod-to-pod traffic is dropped which
# breaks CNPG replication and API server connectivity.
# ============================================================
- name: Fix iptables FORWARD chain on all nodes
  become: true
  ansible.builtin.iptables:
    chain: FORWARD
    policy: ACCEPT

# ============================================================
# 7. Install Helm (master node only)
# Safe to install before cluster exists — it is just
# a client binary that talks to the cluster later.
# ============================================================
- name: Install Helm on master node
  become: true
  ansible.builtin.shell: |
    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm
  when: inventory_hostname in groups['master']

# ============================================================
# 8. Add Helm repos (master node only)
# Repos are just client-side config — no cluster needed.
# They will be available immediately when cluster is ready.
# ============================================================
- name: Add Helm repos
  become: true
  ansible.builtin.shell: |
    /usr/local/bin/helm repo add opensearch https://opensearch-project.github.io/helm-charts/
    /usr/local/bin/helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
    /usr/local/bin/helm repo add cnpg https://cloudnative-pg.github.io/charts
    /usr/local/bin/helm repo add fluent https://fluent.github.io/helm-charts
    /usr/local/bin/helm repo update
  changed_when: false
  when: inventory_hostname in groups['master']
