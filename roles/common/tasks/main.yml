---
# ============================================================
# ROLE: common
# Runs on ALL nodes in Phase 1 — before K3s is installed.
# Only OS-level tasks here. No kubectl or helm cluster
# commands — the cluster does not exist yet at this phase.
# ============================================================

# ============================================================
# 1. Preflight Secret Validation
# Fail early if placeholder or known demo credentials are
# still in use. This keeps the framework from silently
# deploying with insecure defaults.
# ============================================================
- name: Validate secret inputs before continuing
  ansible.builtin.fail:
    msg: >-
      {{ item.label }} is missing, too short, or still using a placeholder/demo
      value. Set it in inventory/group_vars/all/secrets.yml and re-run.
  vars:
    secret_value: "{{ vars[item.variable] | default('') | string | trim }}"
    secret_is_invalid: >-
      {{
        (secret_value | length < item.min_length)
        or (secret_value is match('^replace-with-'))
        or (secret_value in item.forbidden_values)
      }}
  loop:
    - label: K3s cluster token
      variable: vault_k3s_token
      enabled: true
      min_length: 16
      forbidden_values:
        - "SuperSecretTokenForK3sClusterJoin123!"
    - label: OpenSearch admin password
      variable: vault_opensearch_admin_password
      enabled: true
      min_length: 12
      forbidden_values:
        - "S#r2-L%m4!"
    - label: Grafana admin password
      variable: vault_grafana_admin_password
      enabled: true
      min_length: 12
      forbidden_values:
        - "admin"
    - label: Database admin password
      variable: vault_database_superuser_password
      enabled: true
      min_length: 12
      forbidden_values:
        - "SuperuserPassword123!"
    - label: Application database password
      variable: vault_database_app_password
      enabled: true
      min_length: 12
      forbidden_values:
        - "appuserpassword"
    - label: Forgejo admin password
      variable: vault_forgejo_admin_password
      enabled: "{{ database.type == 'postgresql' }}"
      min_length: 12
      forbidden_values:
        - "Strong_AdminPassword123!"
    - label: WeKan admin password
      variable: vault_wekan_admin_password
      enabled: "{{ database.type == 'mongodb' and (wekan.enabled | default(true) | bool) }}"
      min_length: 12
      forbidden_values:
        - "admin"
        - "password"
        - "wekan"
    - label: Alertmanager SMTP username
      variable: vault_alertmanager_smtp_username
      enabled: >-
        {{
          alerting.enabled | default(false) | bool
          and alerting.email.enabled | default(false) | bool
          and alerting.email.auth_enabled | default(true) | bool
        }}
      min_length: 1
      forbidden_values: []
    - label: Alertmanager SMTP password
      variable: vault_alertmanager_smtp_password
      enabled: >-
        {{
          alerting.enabled | default(false) | bool
          and alerting.email.enabled | default(false) | bool
          and alerting.email.auth_enabled | default(true) | bool
        }}
      min_length: 1
      forbidden_values: []
    - label: Alertmanager Telegram bot token
      variable: vault_alertmanager_telegram_bot_token
      enabled: "{{ alerting.enabled | default(false) | bool and alerting.telegram.enabled | default(false) | bool }}"
      min_length: 20
      forbidden_values: []
    - label: Alertmanager Telegram chat ID
      variable: vault_alertmanager_telegram_chat_id
      enabled: "{{ alerting.enabled | default(false) | bool and alerting.telegram.enabled | default(false) | bool }}"
      min_length: 1
      forbidden_values: []
    - label: Alertmanager Slack webhook URL
      variable: vault_alertmanager_slack_api_url
      enabled: "{{ alerting.enabled | default(false) | bool and alerting.slack.enabled | default(false) | bool }}"
      min_length: 20
      forbidden_values: []
    - label: Alertmanager Webex bot token
      variable: vault_alertmanager_webex_bot_token
      enabled: "{{ alerting.enabled | default(false) | bool and alerting.webex.enabled | default(false) | bool }}"
      min_length: 20
      forbidden_values: []
    - label: Alertmanager PagerDuty routing key
      variable: vault_alertmanager_pagerduty_routing_key
      enabled: "{{ alerting.enabled | default(false) | bool and alerting.pagerduty.enabled | default(false) | bool }}"
      min_length: 10
      forbidden_values: []
  loop_control:
    label: "{{ item.label }}"
  when:
    - item.enabled | default(true) | bool
    - secret_is_invalid | bool
  run_once: true

# ============================================================
# 2. Preflight Topology Validation
# ============================================================
- name: Validate host node_pool assignments
  ansible.builtin.fail:
    msg: >-
      Host {{ inventory_hostname }} uses node_pool='{{ resolved_node_pool }}',
      but that pool is not defined in cluster_topology.node_pools.
  vars:
    resolved_node_pool: >-
      {{
        hostvars[inventory_hostname].node_pool
        | default(
            hostvars[inventory_hostname].role
            | default(cluster_topology.default_worker_pool)
          )
      }}
  when: resolved_node_pool not in cluster_topology.node_pools

- name: Validate required workload pools exist in inventory
  ansible.builtin.fail:
    msg: >-
      Required pool '{{ item.pool }}' has no hosts in inventory group
      '{{ cluster_topology.pool_group_prefix ~ item.pool }}'.
      Add at least one host to that pool before deploying {{ item.workload }}.
  loop:
    - workload: Forgejo PostgreSQL application
      pool: "{{ forgejo.pool }}"
      enabled: "{{ database.type == 'postgresql' }}"
    - workload: WeKan MongoDB application
      pool: "{{ wekan.pool }}"
      enabled: "{{ database.type == 'mongodb' and (wekan.enabled | default(true) | bool) }}"
    - workload: database backend
      pool: "{{ database.pool }}"
      enabled: true
    - workload: OpenSearch and logging
      pool: "{{ opensearch.pool }}"
      enabled: true
    - workload: monitoring stack
      pool: "{{ monitoring.pool }}"
      enabled: true
    - workload: AI engine
      pool: "{{ ai_engine.pool }}"
      enabled: true
  loop_control:
    label: "{{ item.pool }}"
  when:
    - item.enabled | bool
    - (groups[cluster_topology.pool_group_prefix ~ item.pool] | default([]) | length) == 0
  run_once: true

- name: Validate database availability goal value
  ansible.builtin.fail:
    msg: >-
      Unsupported database.availability_goal='{{ database.availability_goal }}'.
      Supported values are 'dev', 'replication', and 'quorum_ha'.
  when: database.availability_goal not in ['dev', 'replication', 'quorum_ha']
  run_once: true

- name: Compute database pool capacity facts
  ansible.builtin.set_fact:
    database_pool_hosts_count: "{{ groups[cluster_topology.pool_group_prefix ~ database.pool] | default([]) | length }}"
    database_pg_instances: "{{ database.postgresql.instances | default(1) | int }}"
    database_mongo_members: "{{ database.mongodb.members | default(1) | int }}"
  run_once: true

- name: Validate PostgreSQL instance count
  ansible.builtin.fail:
    msg: >-
      PostgreSQL requires at least 1 instance, but database.postgresql.instances
      is set to {{ database_pg_instances }}.
  when:
    - database.type == 'postgresql'
    - (database_pg_instances | int) < 1
  run_once: true

- name: Validate PostgreSQL spread capacity
  ansible.builtin.fail:
    msg: >-
      PostgreSQL requests {{ database_pg_instances }} instances with
      database.scheduling.spread_policy='{{ database.scheduling.spread_policy }}',
      but pool '{{ database.pool }}' only has {{ database_pool_hosts_count }} node(s).
      Add more database nodes, lower instance count, or relax spread_policy.
  when:
    - database.type == 'postgresql'
    - database.scheduling.spread_policy == 'required'
    - (database_pg_instances | int) > (database_pool_hosts_count | int)
  run_once: true

- name: Validate MongoDB member count
  ansible.builtin.fail:
    msg: >-
      MongoDB requires at least 1 member, but database.mongodb.members is set to
      {{ database_mongo_members }}.
  when:
    - database.type == 'mongodb'
    - (database_mongo_members | int) < 1
  run_once: true

- name: Validate MongoDB spread capacity
  ansible.builtin.fail:
    msg: >-
      MongoDB requests {{ database_mongo_members }} member(s) with
      database.scheduling.spread_policy='{{ database.scheduling.spread_policy }}',
      but pool '{{ database.pool }}' only has {{ database_pool_hosts_count }} node(s).
      Add more database nodes, lower member count, or relax spread_policy.
  when:
    - database.type == 'mongodb'
    - database.scheduling.spread_policy == 'required'
    - (database_mongo_members | int) > (database_pool_hosts_count | int)
  run_once: true

- name: Validate MongoDB quorum HA requirements
  ansible.builtin.fail:
    msg: >-
      MongoDB with database.availability_goal='quorum_ha' needs an odd number of
      voting members and at least 3 data-bearing members. Current configuration
      sets database.mongodb.members={{ database_mongo_members }}.
  when:
    - database.type == 'mongodb'
    - database.availability_goal == 'quorum_ha'
    - (database_mongo_members | int) < 3 or ((database_mongo_members | int) % 2) == 0
  run_once: true

- name: Warn when MongoDB replication mode does not provide automatic quorum failover
  ansible.builtin.debug:
    msg: >-
      MongoDB is running in availability_goal='{{ database.availability_goal }}'
      with {{ database_mongo_members }} member(s). Replication works, but losing
      a member may leave the replica set without a writable primary. Use 3 or
      more odd members for automatic quorum failover.
  when:
    - database.type == 'mongodb'
    - database.availability_goal != 'quorum_ha'
    - (database_mongo_members | int) < 3 or ((database_mongo_members | int) % 2) == 0
  run_once: true

- name: Validate MongoDB operator namespace matches the database namespace
  ansible.builtin.fail:
    msg: >-
      This framework currently supports MongoDB Controllers for Kubernetes only
      when database.mongodb.operator_namespace matches database.namespace.
      Cross-namespace watch mode needs extra ClusterRole, ClusterRoleBinding,
      and ServiceAccount resources that are not implemented here.
  when:
    - database.type == 'mongodb'
    - (database.mongodb.operator_namespace | default(database.namespace)) != database.namespace
  run_once: true

- name: Validate MongoDB operator pool exists
  ansible.builtin.fail:
    msg: >-
      MongoDB operator pool '{{ database.mongodb.operator_pool }}' is not
      defined in cluster_topology.node_pools.
  when:
    - database.type == 'mongodb'
    - (database.mongodb.operator_pool | default(database.pool)) not in cluster_topology.node_pools
  run_once: true

# ============================================================
# 3. Kernel Parameters
# ============================================================
- name: Set Linux kernel parameter vm.max_map_count
  become: true
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present
    reload: yes

# ============================================================
# 4. Disable Swap (Kubernetes requirement)
# ============================================================
- name: Disable swap immediately
  become: true
  ansible.builtin.command: swapoff -a
  when: ansible_swaptotal_mb > 0

- name: Remove swap entry from /etc/fstab
  become: true
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s)'
    replace: '# \1'

# ============================================================
# 5. Package Management
# ============================================================
- name: Update apt cache
  become: true
  ansible.builtin.command:
    argv:
      - apt-get
      - update
      - -y
  changed_when: false
  when: ansible_os_family == 'Debian'

- name: Install required packages
  become: true
  ansible.builtin.command:
    argv:
      - apt-get
      - install
      - -y
      - curl
      - nfs-common
      - tar
      - python3-pip
      - iptables
      - iptables-persistent
  environment:
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: a
  changed_when: false
  when: ansible_os_family == 'Debian'

# ============================================================
# 6. System Configuration
# ============================================================
- name: Set system timezone
  become: true
  ansible.builtin.timezone:
    name: "{{ system_timezone }}"

- name: Ensure python3-kubernetes is installed via pip
  become: true
  ansible.builtin.pip:
    name: "kubernetes=={{ artifact_versions.python_kubernetes }}"
    executable: pip3

# ============================================================
# 6. Network — Fix iptables FORWARD chain
# Must run on ALL nodes before K3s starts.
# Without this, flannel pod-to-pod traffic is dropped which
# breaks CNPG replication and API server connectivity.
# ============================================================
- name: Fix iptables FORWARD chain on all nodes
  become: true
  ansible.builtin.iptables:
    chain: FORWARD
    policy: ACCEPT

# ============================================================
# 7. Install Helm (master node only)
# Safe to install before cluster exists — it is just
# a client binary that talks to the cluster later.
# ============================================================
- name: Install Helm on master node
  become: true
  vars:
    helm_platform_arch: >-
      {% if ansible_architecture in ['x86_64', 'amd64'] %}amd64{% elif ansible_architecture in ['aarch64', 'arm64'] %}arm64{% else %}amd64{% endif %}
    helm_archive_name: "helm-{{ artifact_versions.helm }}-{{ ansible_system | lower }}-{{ helm_platform_arch }}.tar.gz"
    helm_download_url: "https://get.helm.sh/{{ helm_archive_name }}"
    helm_extract_root: "/tmp/helm-{{ artifact_versions.helm }}"
  block:
    - name: Check installed Helm version
      ansible.builtin.command:
        argv:
          - /usr/local/bin/helm
          - version
          - --short
      register: helm_version_check
      changed_when: false
      failed_when: false

    - name: Download pinned Helm archive with curl
      ansible.builtin.command:
        argv:
          - curl
          - -fsSL
          - "{{ helm_download_url }}"
          - -o
          - "/tmp/{{ helm_archive_name }}"
      when: helm_version_check.rc != 0 or artifact_versions.helm not in helm_version_check.stdout

    - name: Ensure Helm extraction directory exists
      ansible.builtin.file:
        path: "{{ helm_extract_root }}"
        state: directory
        mode: '0755'
      when: helm_version_check.rc != 0 or artifact_versions.helm not in helm_version_check.stdout

    - name: Extract pinned Helm archive with tar
      ansible.builtin.command:
        argv:
          - tar
          - -xzf
          - "/tmp/{{ helm_archive_name }}"
          - -C
          - "{{ helm_extract_root }}"
      args:
        creates: "{{ helm_extract_root }}/{{ ansible_system | lower }}-{{ helm_platform_arch }}/helm"
      when: helm_version_check.rc != 0 or artifact_versions.helm not in helm_version_check.stdout

    - name: Install pinned Helm binary
      ansible.builtin.copy:
        src: "{{ helm_extract_root }}/{{ ansible_system | lower }}-{{ helm_platform_arch }}/helm"
        dest: /usr/local/bin/helm
        mode: '0755'
        remote_src: true
      when: helm_version_check.rc != 0 or artifact_versions.helm not in helm_version_check.stdout
  when: inventory_hostname in groups['master']

# ============================================================
# 8. Add Helm repos (master node only)
# Repos are just client-side config — no cluster needed.
# They will be available immediately when cluster is ready.
# ============================================================
- name: Add required Helm repositories
  become: true
  kubernetes.core.helm_repository:
    name: "{{ item.name }}"
    repo_url: "{{ item.repo_url }}"
    state: present
  loop:
    - name: opensearch
      repo_url: https://opensearch-project.github.io/helm-charts/
    - name: prometheus-community
      repo_url: https://prometheus-community.github.io/helm-charts
    - name: cnpg
      repo_url: https://cloudnative-pg.github.io/charts
    - name: mongodb
      repo_url: https://mongodb.github.io/helm-charts
    - name: fluent
      repo_url: https://fluent.github.io/helm-charts
  when: inventory_hostname in groups['master']
