---
# ============================================================
# ROLE: monitoring
# ============================================================

# ============================================================
# 1. Create Monitoring Namespace First
# Custom dashboard ConfigMaps must exist before Grafana starts
# because they are mounted through Grafana provisioning.
# ============================================================
- name: Create monitoring namespace
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: monitoring

# ============================================================
# 2. Render and Apply Custom Dashboard ConfigMap
# These dashboards are mounted into Grafana via
# grafana.dashboardsConfigMaps.custom.
# ============================================================
- name: Render custom dashboards ConfigMap
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    content: "{{ lookup('template', 'grafana-custom-dashboards.yaml.j2') }}"
    dest: /tmp/grafana-custom-dashboards.yaml
    mode: '0644'

- name: Apply custom dashboards ConfigMap
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl apply \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -f /tmp/grafana-custom-dashboards.yaml
  register: custom_dashboards_result
  changed_when: "'created' in custom_dashboards_result.stdout or 'configured' in custom_dashboards_result.stdout"

- name: Show custom dashboards result
  ansible.builtin.debug:
    msg: "{{ custom_dashboards_result.stdout }}"

# ============================================================
# 3. Deploy kube-prometheus-stack
# Fixes included here:
#   - discover ServiceMonitors/PodMonitors cluster-wide
#   - provision community dashboards declaratively
#   - provision custom dashboards from ConfigMap
#   - keep OpenSearch datasource sidecar enabled
# ============================================================
- name: Deploy kube-prometheus-stack via Helm
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: prometheus
    chart_ref: prometheus-community/kube-prometheus-stack
    release_namespace: monitoring
    create_namespace: true
    wait: yes
    timeout: "1200s"
    values:
      prometheus:
        prometheusSpec:
          retention: "{{ monitoring.prometheus_retention }}"
          serviceMonitorSelectorNilUsesHelmValues: false
          serviceMonitorSelector: {}
          serviceMonitorNamespaceSelector: {}
          podMonitorSelectorNilUsesHelmValues: false
          podMonitorSelector: {}
          podMonitorNamespaceSelector: {}
          probeSelectorNilUsesHelmValues: false
          probeSelector: {}
          probeNamespaceSelector: {}
          storageSpec:
            volumeClaimTemplate:
              spec:
                storageClassName: "{{ storage.storage_class }}"
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: "{{ storage.prometheus_size }}"
          nodeSelector:
            workload: "{{ monitoring.node_selector_label }}"
          tolerations:
            - key:      "workload"
              operator: "Equal"
              value:    "{{ monitoring.node_selector_label }}"
              effect:   "NoSchedule"
      alertmanager:
        alertmanagerSpec:
          nodeSelector:
            workload: "{{ monitoring.node_selector_label }}"
          tolerations:
            - key:      "workload"
              operator: "Equal"
              value:    "{{ monitoring.node_selector_label }}"
              effect:   "NoSchedule"
      grafana:
        adminPassword: "{{ monitoring.grafana_admin_password }}"
        service:
          type: ClusterIP
          port: "{{ grafana_port }}"
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ monitoring.node_selector_label }}"
            effect:   "NoSchedule"
        sidecar:
          dashboards:
            enabled: false
          datasources:
            enabled: true
            label: grafana_datasource
            labelValue: "1"
            searchNamespace: ALL
        plugins:
          - grafana-opensearch-datasource
        defaultDashboardsEnabled: false
        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: community
                orgId: 1
                folder: Community
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/community
              - name: custom
                orgId: 1
                folder: Custom
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/custom
        dashboards:
          community:
            k3s-cluster-16450:
              gnetId: 16450
              datasource: Prometheus
            node-exporter-full-1860:
              gnetId: 1860
              datasource: Prometheus
            cnpg-postgresql-20417:
              gnetId: 20417
              datasource: Prometheus
            kubernetes-pods-6417:
              gnetId: 6417
              datasource: Prometheus
            fluent-bit-7752:
              gnetId: 7752
              datasource: Prometheus
            opensearch-14191:
              gnetId: 14191
              datasource: Prometheus
        dashboardsConfigMaps:
          custom: grafana-custom-dashboards
      prometheusOperator:
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ monitoring.node_selector_label }}"
            effect:   "NoSchedule"
        admissionWebhooks:
          patch:
            nodeSelector:
              workload: "{{ monitoring.node_selector_label }}"
            tolerations:
              - key:      "workload"
                operator: "Equal"
                value:    "{{ monitoring.node_selector_label }}"
                effect:   "NoSchedule"
      kube-state-metrics:
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ monitoring.node_selector_label }}"
            effect:   "NoSchedule"
      nodeExporter:
        enabled: true
        tolerations:
          - operator: "Exists"
            effect:   "NoSchedule"

# ============================================================
# 4. Wait for Prometheus to Be Ready
# ============================================================
- name: Wait for Prometheus pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -l app.kubernetes.io/name=prometheus \
      -o jsonpath='{.items[0].status.phase}'
  register: prometheus_status
  until: prometheus_status.stdout == "Running"
  retries: 40
  delay: 15
  changed_when: false

# ============================================================
# 5. Wait for Grafana to Be Ready
# ============================================================
- name: Wait for Grafana pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -l app.kubernetes.io/name=grafana \
      -o jsonpath='{.items[0].status.phase}'
  register: grafana_status
  until: grafana_status.stdout == "Running"
  retries: 40
  delay: 15
  changed_when: false

# ============================================================
# 6. Wait for Alertmanager to Be Ready
# ============================================================
- name: Wait for Alertmanager pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -l app.kubernetes.io/name=alertmanager \
      -o jsonpath='{.items[0].status.phase}'
  register: alertmanager_status
  until: alertmanager_status.stdout == "Running"
  retries: 40
  delay: 15
  changed_when: false

# ============================================================
# 7. Verify Prometheus is Scraping Targets
# ============================================================
- name: Write Prometheus target check script
  become: true
  ansible.builtin.copy:
    dest: /tmp/check_targets.py
    mode: '0755'
    content: |
      import sys, json
      d = json.load(sys.stdin)
      active = d['data']['activeTargets']
      print(f'Active targets: {len(active)}')

- name: Verify Prometheus is scraping targets
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      $(kubectl get pod \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -n monitoring \
        -l app.kubernetes.io/name=prometheus \
        -o jsonpath='{.items[0].metadata.name}') \
      -c prometheus \
      -- wget -qO- http://localhost:9090/api/v1/targets \
      | python3 /tmp/check_targets.py
  register: prometheus_targets
  changed_when: false
  ignore_errors: true

- name: Show Prometheus scrape target count
  ansible.builtin.debug:
    msg: "{{ prometheus_targets.stdout }}"

# ============================================================
# 8. Show Monitoring Stack Pod Summary
# ============================================================
- name: Show monitoring stack pod summary
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -o wide
  register: monitoring_pods
  changed_when: false

- name: Print monitoring stack pod summary
  ansible.builtin.debug:
    var: monitoring_pods.stdout_lines

# ============================================================
# 9. Add OpenSearch Datasource via ConfigMap
# ============================================================
- name: Create OpenSearch datasource ConfigMap
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: grafana-opensearch-datasource
        namespace: monitoring
        labels:
          grafana_datasource: "1"
      data:
        opensearch-datasource.yaml: |
          apiVersion: 1
          datasources:
            - name: OpenSearch
              type: grafana-opensearch-datasource
              uid: opensearch
              access: proxy
              url: https://opensearch-cluster-master.opensearch.svc.cluster.local:9200
              basicAuth: true
              basicAuthUser: admin
              secureJsonData:
                basicAuthPassword: "{{ opensearch.admin_password }}"
              jsonData:
                database: fluent-bit
                interval: Daily
                timeField: "@timestamp"
                tlsSkipVerify: true
                version: "2.x"
                flavor: opensearch
              isDefault: false
              editable: true

# ============================================================
# 10. Wait for Grafana API and OpenSearch Datasource Ready
# ============================================================
- name: Wait for Grafana API to be reachable
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      $(kubectl get pod \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -n monitoring \
        -l app.kubernetes.io/name=grafana \
        -o jsonpath='{.items[0].metadata.name}') \
      -- wget -qO- \
      "http://admin:{{ monitoring.grafana_admin_password }}@localhost:3000/api/health" \
      | grep -q '"database": "ok"'
  register: grafana_api_check
  until: grafana_api_check.rc == 0
  retries: 20
  delay: 15
  changed_when: false

- name: Wait for OpenSearch datasource to be registered
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      $(kubectl get pod \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -n monitoring \
        -l app.kubernetes.io/name=grafana \
        -o jsonpath='{.items[0].metadata.name}') \
      -- wget -qO- \
      "http://admin:{{ monitoring.grafana_admin_password }}@localhost:3000/api/datasources/name/OpenSearch" \
      | grep -q '"uid":"opensearch"'
  register: datasource_ready
  until: datasource_ready.rc == 0
  retries: 20
  delay: 10
  changed_when: false

- name: Show OpenSearch datasource registration status
  ansible.builtin.debug:
    msg: "OpenSearch datasource registered successfully in Grafana"

# ============================================================
# 11. Show provisioned dashboard files inside Grafana
# Helps verify that community + custom dashboards were mounted.
# ============================================================
- name: Show provisioned dashboard files inside Grafana
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      $(kubectl get pod \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -n monitoring \
        -l app.kubernetes.io/name=grafana \
        -o jsonpath='{.items[0].metadata.name}') \
      -- find /var/lib/grafana/dashboards -maxdepth 2 -type f | sort
  register: grafana_dashboard_files
  changed_when: false
  ignore_errors: true

- name: Print provisioned dashboard files
  ansible.builtin.debug:
    var: grafana_dashboard_files.stdout_lines

# ============================================================
# 12. Cleanup temporary files
# ============================================================
- name: Cleanup custom dashboards temp file
  become: true
  ansible.builtin.file:
    path: /tmp/grafana-custom-dashboards.yaml
    state: absent

- name: Cleanup Prometheus target check script
  become: true
  ansible.builtin.file:
    path: /tmp/check_targets.py
    state: absent
