---
# ============================================================
# ROLE: monitoring
# Deploys the full monitoring stack via kube-prometheus-stack:
#   - Prometheus        (metrics collection + storage)
#   - Grafana           (metrics visualization UI)
#   - Alertmanager      (alert routing)
#   - kube-state-metrics(Kubernetes object metrics)
#   - node-exporter     (host-level metrics DaemonSet)
#
# All components pinned to monitor-node via nodeSelector.
# Grafana service type is ClusterIP — Ingress handles routing.
#
# Depends on:
#   - common role (Helm installed + repos added)
#   - k3s_master + k3s_worker (cluster must be healthy)
# ============================================================

# ============================================================
# 1. Deploy kube-prometheus-stack
# ============================================================
- name: Deploy kube-prometheus-stack via Helm
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: prometheus
    chart_ref: prometheus-community/kube-prometheus-stack
    release_namespace: monitoring
    create_namespace: true
    wait: yes
    timeout: "1200s"
    values:
      prometheus:
        prometheusSpec:
          retention: "{{ monitoring.prometheus_retention }}"
          storageSpec:
            volumeClaimTemplate:
              spec:
                storageClassName: "{{ storage.storage_class }}"
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: "{{ storage.prometheus_size }}"
          nodeSelector:
            workload: "{{ monitoring.node_selector_label }}"
          tolerations:
            - key:      "workload"
              operator: "Equal"
              value:    "{{ monitoring.node_selector_label }}"
              effect:   "NoSchedule"
      alertmanager:
        alertmanagerSpec:
          nodeSelector:
            workload: "{{ monitoring.node_selector_label }}"
          tolerations:
            - key:      "workload"
              operator: "Equal"
              value:    "{{ monitoring.node_selector_label }}"
              effect:   "NoSchedule"
      grafana:
        adminPassword: "{{ monitoring.grafana_admin_password }}"
        # ClusterIP — Ingress role handles external routing
        service:
          type: ClusterIP
          port: "{{ grafana_port }}"
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ monitoring.node_selector_label }}"
            effect:   "NoSchedule"
        # --------------------------------------------------------
        # Sidecar watches ConfigMaps with grafana_dashboard: "1"
        # and auto-loads them — no manual import needed
        # --------------------------------------------------------
        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
            labelValue: "1"
            searchNamespace: ALL
          datasources:
            enabled: true
            label: grafana_datasource
            labelValue: "1"
            searchNamespace: ALL
        # --------------------------------------------------------
        # OpenSearch datasource plugin
        # Required for custom log dashboards
        # --------------------------------------------------------
        plugins:
          - grafana-opensearch-datasource
        # --------------------------------------------------------
        # Disable default dashboards — we provide better ones
        # --------------------------------------------------------
        defaultDashboardsEnabled: false
      prometheusOperator:
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ monitoring.node_selector_label }}"
            effect:   "NoSchedule"
        admissionWebhooks:
          patch:
            nodeSelector:
              workload: "{{ monitoring.node_selector_label }}"
            tolerations:
              - key:      "workload"
                operator: "Equal"
                value:    "{{ monitoring.node_selector_label }}"
                effect:   "NoSchedule"
      kube-state-metrics:
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ monitoring.node_selector_label }}"
            effect:   "NoSchedule"
      # node-exporter runs on ALL nodes as a DaemonSet.
      # Exists toleration ensures it bypasses every workload
      # taint so no node is left without host metrics.
      nodeExporter:
        enabled: true
        tolerations:
          - operator: "Exists"
            effect:   "NoSchedule"

# ============================================================
# 2. Wait for Prometheus to Be Ready
# ============================================================
- name: Wait for Prometheus pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -l app.kubernetes.io/name=prometheus \
      -o jsonpath='{.items[0].status.phase}'
  register: prometheus_status
  until: prometheus_status.stdout == "Running"
  retries: 40
  delay: 15
  changed_when: false

# ============================================================
# 3. Wait for Grafana to Be Ready
# ============================================================
- name: Wait for Grafana pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -l app.kubernetes.io/name=grafana \
      -o jsonpath='{.items[0].status.phase}'
  register: grafana_status
  until: grafana_status.stdout == "Running"
  retries: 40
  delay: 15
  changed_when: false

# ============================================================
# 4. Wait for Alertmanager to Be Ready
# ============================================================
- name: Wait for Alertmanager pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -l app.kubernetes.io/name=alertmanager \
      -o jsonpath='{.items[0].status.phase}'
  register: alertmanager_status
  until: alertmanager_status.stdout == "Running"
  retries: 40
  delay: 15
  changed_when: false

# ============================================================
# 5. Verify Prometheus is Scraping Targets
# Write python script to temp file to avoid shell
# collapsing multiline code into a single broken line.
# ============================================================
- name: Write Prometheus target check script
  become: true
  ansible.builtin.copy:
    dest: /tmp/check_targets.py
    mode: '0755'
    content: |
      import sys, json
      d = json.load(sys.stdin)
      active = d['data']['activeTargets']
      print(f'Active targets: {len(active)}')

- name: Verify Prometheus is scraping targets
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      $(kubectl get pod \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -n monitoring \
        -l app.kubernetes.io/name=prometheus \
        -o jsonpath='{.items[0].metadata.name}') \
      -c prometheus \
      -- wget -qO- http://localhost:9090/api/v1/targets \
      | python3 /tmp/check_targets.py
  register: prometheus_targets
  changed_when: false
  ignore_errors: true

- name: Show Prometheus scrape target count
  ansible.builtin.debug:
    msg: "{{ prometheus_targets.stdout }}"

# ============================================================
# 6. Show Monitoring Stack Pod Summary
# ============================================================
- name: Show monitoring stack pod summary
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -o wide
  register: monitoring_pods
  changed_when: false

- name: Print monitoring stack pod summary
  ansible.builtin.debug:
    var: monitoring_pods.stdout_lines

# ============================================================
# 7. Add OpenSearch as Grafana Data Source via ConfigMap
# The sidecar picks this up automatically — no API call
# needed. Label grafana_datasource: "1" triggers loading.
# ============================================================
- name: Create OpenSearch datasource ConfigMap
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: grafana-opensearch-datasource
        namespace: monitoring
        labels:
          grafana_datasource: "1"
      data:
        opensearch-datasource.yaml: |
          apiVersion: 1
          datasources:
            - name: OpenSearch
              type: grafana-opensearch-datasource
              uid: opensearch
              access: proxy
              url: https://opensearch-cluster-master.opensearch.svc.cluster.local:9200
              basicAuth: true
              basicAuthUser: admin
              secureJsonData:
                basicAuthPassword: "{{ opensearch.admin_password }}"
              jsonData:
                database: fluent-bit
                interval: Daily
                timeField: "@timestamp"
                tlsSkipVerify: true
                version: "2.x"
                flavor: opensearch
              isDefault: false
              editable: true

# ============================================================
# 8. Import Community Dashboards via Grafana API
# Waits for Grafana API to be reachable first.
# Each dashboard is imported by its Grafana.com ID.
# ============================================================
- name: Wait for Grafana API to be reachable
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      $(kubectl get pod \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -n monitoring \
        -l app.kubernetes.io/name=grafana \
        -o jsonpath='{.items[0].metadata.name}') \
      -- wget -qO- \
      "http://admin:{{ monitoring.grafana_admin_password }}@localhost:3000/api/health" \
      | grep -q '"database": "ok"'
  register: grafana_api_check
  until: grafana_api_check.rc == 0
  retries: 20
  delay: 15
  changed_when: false

- name: Import community dashboards into Grafana
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      $(kubectl get pod \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -n monitoring \
        -l app.kubernetes.io/name=grafana \
        -o jsonpath='{.items[0].metadata.name}') \
      -- wget -qO- \
      --header="Content-Type: application/json" \
      --post-data='{"dashboard":{"id":{{ item.id }},"uid":null},"folderId":0,"overwrite":true}' \
      "http://admin:{{ monitoring.grafana_admin_password }}@localhost:3000/api/dashboards/import"
  loop:
    - { id: 16450, name: "K3s Cluster"         }
    - { id: 1860,  name: "Node Exporter Full"   }
    - { id: 20417, name: "CNPG PostgreSQL"      }
    - { id: 6417,  name: "Kubernetes Pods"      }
    - { id: 7752,  name: "Fluent-bit"           }
    - { id: 14191, name: "OpenSearch"           }
  loop_control:
    label: "Importing: {{ item.name }}"
  register: dashboard_import
  changed_when: false
  ignore_errors: true

- name: Show dashboard import results
  ansible.builtin.debug:
    msg: "Imported dashboard: {{ item.item.name }}"
  loop: "{{ dashboard_import.results }}"
  loop_control:
    label: "{{ item.item.name }}"

# ============================================================
# 9. Deploy Custom Dashboards via ConfigMap
# Rendered from templates and applied via kubectl.
# Sidecar auto-loads them — no Grafana restart needed.
# ============================================================
- name: Render custom dashboards ConfigMap
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    content: "{{ lookup('template', 'grafana-custom-dashboards.yaml.j2') }}"
    dest: /tmp/grafana-custom-dashboards.yaml
    mode: '0644'

- name: Apply custom dashboards ConfigMap
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl apply \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -f /tmp/grafana-custom-dashboards.yaml
  register: custom_dashboards_result
  changed_when: "'created' in custom_dashboards_result.stdout or
                 'configured' in custom_dashboards_result.stdout"

- name: Show custom dashboards apply result
  ansible.builtin.debug:
    msg: "{{ custom_dashboards_result.stdout }}"

- name: Remove custom dashboards temp file
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.file:
    path: /tmp/grafana-custom-dashboards.yaml
    state: absent