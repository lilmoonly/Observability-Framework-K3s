---
# ============================================================
# ROLE: monitoring
# ============================================================

# ============================================================
# 1. Deploy kube-prometheus-stack
# ============================================================
- name: Deploy kube-prometheus-stack via Helm
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: prometheus
    chart_ref: prometheus-community/kube-prometheus-stack
    release_namespace: monitoring
    create_namespace: true
    wait: yes
    timeout: "1200s"
    values:
      prometheus:
        prometheusSpec:
          retention: "{{ monitoring.prometheus_retention }}"
          storageSpec:
            volumeClaimTemplate:
              spec:
                storageClassName: "{{ storage.storage_class }}"
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: "{{ storage.prometheus_size }}"
          nodeSelector:
            workload: "{{ monitoring.node_selector_label }}"
          tolerations:
            - key:      "workload"
              operator: "Equal"
              value:    "{{ monitoring.node_selector_label }}"
              effect:   "NoSchedule"
      alertmanager:
        alertmanagerSpec:
          nodeSelector:
            workload: "{{ monitoring.node_selector_label }}"
          tolerations:
            - key:      "workload"
              operator: "Equal"
              value:    "{{ monitoring.node_selector_label }}"
              effect:   "NoSchedule"
      grafana:
        adminPassword: "{{ monitoring.grafana_admin_password }}"
        service:
          type: ClusterIP
          port: "{{ grafana_port }}"
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ monitoring.node_selector_label }}"
            effect:   "NoSchedule"
        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
            labelValue: "1"
            searchNamespace: ALL
          datasources:
            enabled: true
            label: grafana_datasource
            labelValue: "1"
            searchNamespace: ALL
        plugins:
          - grafana-opensearch-datasource
        defaultDashboardsEnabled: false
      prometheusOperator:
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ monitoring.node_selector_label }}"
            effect:   "NoSchedule"
        admissionWebhooks:
          patch:
            nodeSelector:
              workload: "{{ monitoring.node_selector_label }}"
            tolerations:
              - key:      "workload"
                operator: "Equal"
                value:    "{{ monitoring.node_selector_label }}"
                effect:   "NoSchedule"
      kube-state-metrics:
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ monitoring.node_selector_label }}"
            effect:   "NoSchedule"
      nodeExporter:
        enabled: true
        tolerations:
          - operator: "Exists"
            effect:   "NoSchedule"

# ============================================================
# 2. Wait for Prometheus to Be Ready
# ============================================================
- name: Wait for Prometheus pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -l app.kubernetes.io/name=prometheus \
      -o jsonpath='{.items[0].status.phase}'
  register: prometheus_status
  until: prometheus_status.stdout == "Running"
  retries: 40
  delay: 15
  changed_when: false

# ============================================================
# 3. Wait for Grafana to Be Ready
# ============================================================
- name: Wait for Grafana pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -l app.kubernetes.io/name=grafana \
      -o jsonpath='{.items[0].status.phase}'
  register: grafana_status
  until: grafana_status.stdout == "Running"
  retries: 40
  delay: 15
  changed_when: false

# ============================================================
# 4. Wait for Alertmanager to Be Ready
# ============================================================
- name: Wait for Alertmanager pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -l app.kubernetes.io/name=alertmanager \
      -o jsonpath='{.items[0].status.phase}'
  register: alertmanager_status
  until: alertmanager_status.stdout == "Running"
  retries: 40
  delay: 15
  changed_when: false

# ============================================================
# 5. Verify Prometheus is Scraping Targets
# ============================================================
- name: Write Prometheus target check script
  become: true
  ansible.builtin.copy:
    dest: /tmp/check_targets.py
    mode: '0755'
    content: |
      import sys, json
      d = json.load(sys.stdin)
      active = d['data']['activeTargets']
      print(f'Active targets: {len(active)}')

- name: Verify Prometheus is scraping targets
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      $(kubectl get pod \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -n monitoring \
        -l app.kubernetes.io/name=prometheus \
        -o jsonpath='{.items[0].metadata.name}') \
      -c prometheus \
      -- wget -qO- http://localhost:9090/api/v1/targets \
      | python3 /tmp/check_targets.py
  register: prometheus_targets
  changed_when: false
  ignore_errors: true

- name: Show Prometheus scrape target count
  ansible.builtin.debug:
    msg: "{{ prometheus_targets.stdout }}"

# ============================================================
# 6. Show Monitoring Stack Pod Summary
# ============================================================
- name: Show monitoring stack pod summary
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -o wide
  register: monitoring_pods
  changed_when: false

- name: Print monitoring stack pod summary
  ansible.builtin.debug:
    var: monitoring_pods.stdout_lines

# ============================================================
# 7. Add OpenSearch Datasource via ConfigMap
# ============================================================
- name: Create OpenSearch datasource ConfigMap
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: grafana-opensearch-datasource
        namespace: monitoring
        labels:
          grafana_datasource: "1"
      data:
        opensearch-datasource.yaml: |
          apiVersion: 1
          datasources:
            - name: OpenSearch
              type: grafana-opensearch-datasource
              uid: opensearch
              access: proxy
              url: https://opensearch-cluster-master.opensearch.svc.cluster.local:9200
              basicAuth: true
              basicAuthUser: admin
              secureJsonData:
                basicAuthPassword: "{{ opensearch.admin_password }}"
              jsonData:
                database: fluent-bit
                interval: Daily
                timeField: "@timestamp"
                tlsSkipVerify: true
                version: "2.x"
                flavor: opensearch
              isDefault: false
              editable: true

# ============================================================
# 8. Wait for Grafana API + Plugin Ready
# Extra wait ensures OpenSearch plugin finishes installing
# before we try to use the datasource in dashboards.
# ============================================================
- name: Wait for Grafana API to be reachable
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      $(kubectl get pod \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -n monitoring \
        -l app.kubernetes.io/name=grafana \
        -o jsonpath='{.items[0].metadata.name}') \
      -- wget -qO- \
      "http://admin:{{ monitoring.grafana_admin_password }}@localhost:3000/api/health" \
      | grep -q '"database": "ok"'
  register: grafana_api_check
  until: grafana_api_check.rc == 0
  retries: 20
  delay: 15
  changed_when: false

- name: Wait for OpenSearch plugin to finish installing
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      $(kubectl get pod \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -n monitoring \
        -l app.kubernetes.io/name=grafana \
        -o jsonpath='{.items[0].metadata.name}') \
      -- wget -qO- \
      "http://admin:{{ monitoring.grafana_admin_password }}@localhost:3000/api/plugins/grafana-opensearch-datasource/settings" \
      | grep -q '"enabled":true'
  register: plugin_ready
  until: plugin_ready.rc == 0
  retries: 20
  delay: 10
  changed_when: false

# ============================================================
# 9. Import Community Dashboards
# FIX: All JSON processing runs on k8s-ctrl (has python3).
# Only the final HTTP POST goes into the Grafana pod via
# kubectl exec + wget. No python3 needed inside the pod.
# ============================================================
- name: Write dashboard fetch and prepare script (runs on k8s-ctrl)
  become: true
  ansible.builtin.copy:
    dest: /tmp/prepare_dashboard.py
    mode: '0755'
    content: |
      #!/usr/bin/env python3
      """
      Fetches a dashboard from grafana.com and prepares
      the import payload JSON file on k8s-ctrl.
      Usage: python3 prepare_dashboard.py <dashboard_id>
      Output: /tmp/payload_<id>.json ready to POST
      """
      import sys
      import json
      import urllib.request
      import urllib.error

      DASHBOARD_ID = sys.argv[1]

      # Map plugin types to local Grafana datasource names
      PLUGIN_MAP = {
          'prometheus':    'Prometheus',
          'alertmanager':  'Alertmanager',
          'loki':          'Loki',
          'elasticsearch': 'OpenSearch',
          'opensearch':    'OpenSearch',
          'grafana':       'grafana',
      }

      url = f'https://grafana.com/api/dashboards/{DASHBOARD_ID}/revisions/latest/download'
      print(f'Fetching dashboard {DASHBOARD_ID} from grafana.com...')

      try:
          with urllib.request.urlopen(url, timeout=30) as resp:
              dash = json.loads(resp.read())
      except urllib.error.URLError as e:
          print(f'FAILED to fetch: {e}')
          sys.exit(1)

      # Map all __inputs to local datasource names
      inputs = dash.get('__inputs', [])
      mapped = []
      for inp in inputs:
          if inp.get('type') == 'datasource':
              plugin = inp.get('pluginId', '')
              name   = inp.get('name', '')
              value  = PLUGIN_MAP.get(plugin, plugin)
              mapped.append({
                  'name':     name,
                  'type':     'datasource',
                  'pluginId': plugin,
                  'value':    value
              })
              print(f'  Mapped input: {name} ({plugin}) -> {value}')

      if not inputs:
          print('  No __inputs found (dashboard uses default datasource)')

      payload = {
          'dashboard': dash,
          'folderId':  0,
          'overwrite': True,
          'inputs':    mapped
      }

      out_path = f'/tmp/payload_{DASHBOARD_ID}.json'
      with open(out_path, 'w') as f:
          json.dump(payload, f)

      print(f'Payload written to {out_path}')
      print(f'SUCCESS_PREPARED')

- name: Fetch and prepare all community dashboard payloads
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    python3 /tmp/prepare_dashboard.py {{ item.id }}
  loop:
    - { id: 16450, name: "K3s Cluster"        }
    - { id: 1860,  name: "Node Exporter Full"  }
    - { id: 20417, name: "CNPG PostgreSQL"     }
    - { id: 6417,  name: "Kubernetes Pods"     }
    - { id: 7752,  name: "Fluent-bit"          }
    - { id: 14191, name: "OpenSearch"          }
  loop_control:
    label: "Preparing: {{ item.name }}"
  register: prepare_results
  changed_when: false
  ignore_errors: true

- name: Show preparation results
  ansible.builtin.debug:
    msg: "{{ item.item.name }}: {{ item.stdout_lines | last | default('no output') }}"
  loop: "{{ prepare_results.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Copy payload files into Grafana pod and import
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    GRAFANA_POD=$(kubectl get pod \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -l app.kubernetes.io/name=grafana \
      -o jsonpath='{.items[0].metadata.name}')

    # Copy payload into pod
    kubectl cp \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      /tmp/payload_{{ item.id }}.json \
      monitoring/${GRAFANA_POD}:/tmp/payload_{{ item.id }}.json

    # POST to Grafana import API from inside pod
    # Uses wget which is available in Alpine Grafana image
    RESULT=$(kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring ${GRAFANA_POD} \
      -- wget -qO- \
      --header="Content-Type: application/json" \
      --post-file="/tmp/payload_{{ item.id }}.json" \
      "http://admin:{{ monitoring.grafana_admin_password }}@localhost:3000/api/dashboards/import")

    echo "$RESULT"

    # Cleanup inside pod
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring ${GRAFANA_POD} \
      -- rm -f /tmp/payload_{{ item.id }}.json

    echo "$RESULT" | grep -q '"status":"success"' && \
      echo "IMPORTED_OK" || echo "IMPORT_FAILED_CHECK_ABOVE"
  loop:
    - { id: 16450, name: "K3s Cluster"        }
    - { id: 1860,  name: "Node Exporter Full"  }
    - { id: 20417, name: "CNPG PostgreSQL"     }
    - { id: 6417,  name: "Kubernetes Pods"     }
    - { id: 7752,  name: "Fluent-bit"          }
    - { id: 14191, name: "OpenSearch"          }
  loop_control:
    label: "Importing: {{ item.name }}"
  register: import_results
  changed_when: false
  ignore_errors: true

- name: Show import results
  ansible.builtin.debug:
    msg: "{{ item.item.name }}: {{ item.stdout_lines | select('match', '.*(IMPORTED|FAILED).*') | list | last | default('no status line') }}"
  loop: "{{ import_results.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Cleanup payload files from k8s-ctrl
  become: true
  ansible.builtin.file:
    path: "/tmp/payload_{{ item.id }}.json"
    state: absent
  loop:
    - { id: 16450 }
    - { id: 1860  }
    - { id: 20417 }
    - { id: 6417  }
    - { id: 7752  }
    - { id: 14191 }
  loop_control:
    label: "Cleanup {{ item.id }}"

- name: Cleanup prepare script
  become: true
  ansible.builtin.file:
    path: /tmp/prepare_dashboard.py
    state: absent

# ============================================================
# 10. Deploy Custom Dashboards via ConfigMap
# ============================================================
- name: Render custom dashboards ConfigMap
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    content: "{{ lookup('template', 'grafana-custom-dashboards.yaml.j2') }}"
    dest: /tmp/grafana-custom-dashboards.yaml
    mode: '0644'

- name: Apply custom dashboards ConfigMap
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl apply \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -f /tmp/grafana-custom-dashboards.yaml
  register: custom_dashboards_result
  changed_when: "'created' in custom_dashboards_result.stdout or
                 'configured' in custom_dashboards_result.stdout"

- name: Show custom dashboards result
  ansible.builtin.debug:
    msg: "{{ custom_dashboards_result.stdout }}"

- name: Cleanup custom dashboards temp file
  become: true
  ansible.builtin.file:
    path: /tmp/grafana-custom-dashboards.yaml
    state: absent