---
# ============================================================
# ROLE: monitoring
# Deploys the full monitoring stack via kube-prometheus-stack:
#   - Prometheus        (metrics collection + storage)
#   - Grafana           (metrics visualization UI)
#   - Alertmanager      (alert routing)
#   - kube-state-metrics(Kubernetes object metrics)
#   - node-exporter     (host-level metrics DaemonSet)
#
# All components pinned to monitor-node via nodeSelector.
# Grafana service type is ClusterIP — Ingress handles routing.
#
# Depends on:
#   - common role (Helm installed + repos added)
#   - k3s_master + k3s_worker (cluster must be healthy)
# ============================================================

# ============================================================
# 1. Deploy kube-prometheus-stack
# ============================================================
- name: Deploy kube-prometheus-stack via Helm
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: prometheus
    chart_ref: prometheus-community/kube-prometheus-stack
    release_namespace: monitoring
    create_namespace: true
    wait: yes
    timeout: "1200s"
    values:
      prometheus:
        prometheusSpec:
          retention: "{{ monitoring.prometheus_retention }}"
          storageSpec:
            volumeClaimTemplate:
              spec:
                storageClassName: "{{ storage.storage_class }}"
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: "{{ storage.prometheus_size }}"
          nodeSelector:
            workload: "{{ monitoring.node_selector_label }}"
          tolerations:
            - key:      "workload"
              operator: "Equal"
              value:    "{{ monitoring.node_selector_label }}"
              effect:   "NoSchedule"
      alertmanager:
        alertmanagerSpec:
          nodeSelector:
            workload: "{{ monitoring.node_selector_label }}"
          tolerations:
            - key:      "workload"
              operator: "Equal"
              value:    "{{ monitoring.node_selector_label }}"
              effect:   "NoSchedule"
      grafana:
        adminPassword: "{{ monitoring.grafana_admin_password }}"
        # ClusterIP — Ingress role handles external routing
        service:
          type: ClusterIP
          port: "{{ grafana_port }}"
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ monitoring.node_selector_label }}"
            effect:   "NoSchedule"
        # --------------------------------------------------------
        # Sidecar watches ConfigMaps with grafana_dashboard: "1"
        # and auto-loads them — no manual import needed
        # --------------------------------------------------------
        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
            labelValue: "1"
            searchNamespace: ALL
          datasources:
            enabled: true
            label: grafana_datasource
            labelValue: "1"
            searchNamespace: ALL
        # --------------------------------------------------------
        # OpenSearch datasource plugin
        # Required for custom log dashboards
        # --------------------------------------------------------
        plugins:
          - grafana-opensearch-datasource
        # --------------------------------------------------------
        # Disable default dashboards — we provide better ones
        # --------------------------------------------------------
        defaultDashboardsEnabled: false
      prometheusOperator:
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ monitoring.node_selector_label }}"
            effect:   "NoSchedule"
        admissionWebhooks:
          patch:
            nodeSelector:
              workload: "{{ monitoring.node_selector_label }}"
            tolerations:
              - key:      "workload"
                operator: "Equal"
                value:    "{{ monitoring.node_selector_label }}"
                effect:   "NoSchedule"
      kube-state-metrics:
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ monitoring.node_selector_label }}"
            effect:   "NoSchedule"
      nodeExporter:
        enabled: true
        tolerations:
          - operator: "Exists"
            effect:   "NoSchedule"

# ============================================================
# 2. Wait for Prometheus to Be Ready
# ============================================================
- name: Wait for Prometheus pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -l app.kubernetes.io/name=prometheus \
      -o jsonpath='{.items[0].status.phase}'
  register: prometheus_status
  until: prometheus_status.stdout == "Running"
  retries: 40
  delay: 15
  changed_when: false

# ============================================================
# 3. Wait for Grafana to Be Ready
# ============================================================
- name: Wait for Grafana pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -l app.kubernetes.io/name=grafana \
      -o jsonpath='{.items[0].status.phase}'
  register: grafana_status
  until: grafana_status.stdout == "Running"
  retries: 40
  delay: 15
  changed_when: false

# ============================================================
# 4. Wait for Alertmanager to Be Ready
# ============================================================
- name: Wait for Alertmanager pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -l app.kubernetes.io/name=alertmanager \
      -o jsonpath='{.items[0].status.phase}'
  register: alertmanager_status
  until: alertmanager_status.stdout == "Running"
  retries: 40
  delay: 15
  changed_when: false

# ============================================================
# 5. Verify Prometheus is Scraping Targets
# ============================================================
- name: Write Prometheus target check script
  become: true
  ansible.builtin.copy:
    dest: /tmp/check_targets.py
    mode: '0755'
    content: |
      import sys, json
      d = json.load(sys.stdin)
      active = d['data']['activeTargets']
      print(f'Active targets: {len(active)}')

- name: Verify Prometheus is scraping targets
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      $(kubectl get pod \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -n monitoring \
        -l app.kubernetes.io/name=prometheus \
        -o jsonpath='{.items[0].metadata.name}') \
      -c prometheus \
      -- wget -qO- http://localhost:9090/api/v1/targets \
      | python3 /tmp/check_targets.py
  register: prometheus_targets
  changed_when: false
  ignore_errors: true

- name: Show Prometheus scrape target count
  ansible.builtin.debug:
    msg: "{{ prometheus_targets.stdout }}"

# ============================================================
# 6. Show Monitoring Stack Pod Summary
# ============================================================
- name: Show monitoring stack pod summary
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -o wide
  register: monitoring_pods
  changed_when: false

- name: Print monitoring stack pod summary
  ansible.builtin.debug:
    var: monitoring_pods.stdout_lines

# ============================================================
# 7. Add OpenSearch as Grafana Data Source via ConfigMap
# UID explicitly set to "opensearch" so dashboard JSON
# references always resolve correctly without mismatch.
# ============================================================
- name: Create OpenSearch datasource ConfigMap
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: grafana-opensearch-datasource
        namespace: monitoring
        labels:
          grafana_datasource: "1"
      data:
        opensearch-datasource.yaml: |
          apiVersion: 1
          datasources:
            - name: OpenSearch
              type: grafana-opensearch-datasource
              uid: opensearch
              access: proxy
              url: https://opensearch-cluster-master.opensearch.svc.cluster.local:9200
              basicAuth: true
              basicAuthUser: admin
              secureJsonData:
                basicAuthPassword: "{{ opensearch.admin_password }}"
              jsonData:
                database: fluent-bit
                interval: Daily
                timeField: "@timestamp"
                tlsSkipVerify: true
                version: "2.x"
                flavor: opensearch
              isDefault: false
              editable: true

# ============================================================
# 8. Wait for Grafana API to Be Reachable
# ============================================================
- name: Wait for Grafana API to be reachable
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      $(kubectl get pod \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -n monitoring \
        -l app.kubernetes.io/name=grafana \
        -o jsonpath='{.items[0].metadata.name}') \
      -- wget -qO- \
      "http://admin:{{ monitoring.grafana_admin_password }}@localhost:3000/api/health" \
      | grep -q '"database": "ok"'
  register: grafana_api_check
  until: grafana_api_check.rc == 0
  retries: 20
  delay: 15
  changed_when: false

# ============================================================
# 9. Community Dashboard Import
# ============================================================
- name: Write dashboard import script
  become: true
  ansible.builtin.copy:
    dest: /tmp/import_dashboard.sh
    mode: '0755'
    content: |
      #!/bin/sh
      ID=$1
      PASS=$2

      echo "=== Dashboard ${ID} ==="

      # Fetch from grafana.com
      wget -qO "/tmp/raw_${ID}.json" \
        "https://grafana.com/api/dashboards/${ID}/revisions/latest/download"

      if [ ! -s "/tmp/raw_${ID}.json" ]; then
        echo "FAILED: empty response for ${ID}"
        exit 1
      fi

      # Build inputs mapping using python
      # Maps every known datasource type to local Grafana name
      python3 << 'PYEOF'
      import json, sys

      with open(f'/tmp/raw_{sys.argv[1]}.json') as f:
          dash = json.load(f)

      inputs = dash.get('__inputs', [])
      mapped = []

      # Map by pluginId to correct local datasource name
      plugin_map = {
          'prometheus':    'Prometheus',
          'alertmanager':  'Alertmanager',
          'loki':          'Loki',
          'elasticsearch': 'OpenSearch',
          'opensearch':    'OpenSearch',
          'grafana':       'grafana',
      }

      for inp in inputs:
          if inp.get('type') == 'datasource':
              plugin = inp.get('pluginId', '')
              name   = inp.get('name', '')
              value  = plugin_map.get(plugin, plugin)
              mapped.append({
                  'name':     name,
                  'type':     'datasource',
                  'pluginId': plugin,
                  'value':    value
              })

      payload = {
          'dashboard': dash,
          'folderId':  0,
          'overwrite': True,
          'inputs':    mapped
      }

      with open(f'/tmp/payload_{sys.argv[1]}.json', 'w') as f:
          json.dump(payload, f)

      print(f'Mapped {len(mapped)} inputs: {[m["name"]+"->"+m["value"] for m in mapped]}')
      PYEOF

      # Post to Grafana
      RESULT=$(wget -qO- \
        --header="Content-Type: application/json" \
        --post-file="/tmp/payload_${ID}.json" \
        "http://admin:${PASS}@localhost:3000/api/dashboards/import")

      echo "Result: $RESULT"

      # Cleanup
      rm -f "/tmp/raw_${ID}.json" "/tmp/payload_${ID}.json"

      echo "$RESULT" | grep -q '"status":"success"' && \
        echo "SUCCESS" || echo "CHECK RESULT ABOVE"

- name: Copy import script into Grafana pod
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl cp \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      /tmp/import_dashboard.sh \
      monitoring/$(kubectl get pod \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -n monitoring \
        -l app.kubernetes.io/name=grafana \
        -o jsonpath='{.items[0].metadata.name}'):/tmp/import_dashboard.sh
  changed_when: false

- name: Import all community dashboards
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      $(kubectl get pod \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -n monitoring \
        -l app.kubernetes.io/name=grafana \
        -o jsonpath='{.items[0].metadata.name}') \
      -- sh /tmp/import_dashboard.sh \
         {{ item.id }} \
         "{{ monitoring.grafana_admin_password }}"
  loop:
    - { id: 16450, name: "K3s Cluster"        }
    - { id: 1860,  name: "Node Exporter Full"  }
    - { id: 20417, name: "CNPG PostgreSQL"     }
    - { id: 6417,  name: "Kubernetes Pods"     }
    - { id: 7752,  name: "Fluent-bit"          }
    - { id: 14191, name: "OpenSearch"          }
  loop_control:
    label: "{{ item.name }}"
  register: dashboard_import
  changed_when: false
  ignore_errors: true

- name: Show import results
  ansible.builtin.debug:
    msg: "{{ item.item.name }}: {{ item.stdout_lines | select('match', '.*(SUCCESS|FAILED|CHECK).*') | list | last | default('see full output') }}"
  loop: "{{ dashboard_import.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Cleanup import script
  become: true
  ansible.builtin.file:
    path: /tmp/import_dashboard.sh
    state: absent

# ============================================================
# 10. Deploy Custom Dashboards (Updated Queries)
# ============================================================
- name: Render custom dashboards ConfigMap
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    content: "{{ lookup('template', 'grafana-custom-dashboards.yaml.j2') }}"
    dest: /tmp/grafana-custom-dashboards.yaml
    mode: '0644'

- name: Apply custom dashboards ConfigMap
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl apply \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -f /tmp/grafana-custom-dashboards.yaml
  register: custom_dashboards_result

- name: Cleanup temp files
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/import_dashboard.sh
    - /tmp/grafana-custom-dashboards.yaml