---
# ============================================================
# ROLE: monitoring
# Deploys the full monitoring stack via kube-prometheus-stack:
#   - Prometheus        (metrics collection + storage)
#   - Grafana           (metrics visualization UI)
#   - Alertmanager      (alert routing)
#   - kube-state-metrics(Kubernetes object metrics)
#   - node-exporter     (host-level metrics DaemonSet)
#
# Monitoring components are pinned to the configured monitoring pool.
# Grafana service type is ClusterIP — Ingress handles routing.
#
# Depends on:
#   - common role (Helm installed + repos added)
#   - k3s_master + k3s_worker (cluster must be healthy)
# ============================================================

# ============================================================
# 1. Deploy kube-prometheus-stack
# ============================================================
- name: Validate Alertmanager notification configuration
  ansible.builtin.fail:
    msg: >-
      {{ item.label }} is not configured. Update alerting settings in
      inventory/group_vars/all/main.yml and secrets in
      inventory/group_vars/all/secrets.yml before deploying monitoring.
  vars:
    value: "{{ item.value | default('') | string | trim }}"
    invalid_value: >-
      {{
        value | length == 0
        or (item.placeholder | default('') | length > 0 and value == item.placeholder)
        or (item.must_contain | default('') | length > 0 and item.must_contain not in value)
        or (item.regex | default('') | length > 0 and not (value is match(item.regex)))
        or (value is match('^replace-with-'))
      }}
  loop:
    - label: Alerting email SMTP smarthost
      enabled: "{{ alerting.enabled | default(false) | bool and alerting.email.enabled | default(false) | bool }}"
      value: "{{ alerting.email.smarthost | default('') }}"
      placeholder: "smtp.example.com:587"
      must_contain: ":"
    - label: Alerting email sender
      enabled: "{{ alerting.enabled | default(false) | bool and alerting.email.enabled | default(false) | bool }}"
      value: "{{ alerting.email.from | default('') }}"
      placeholder: "alerts@example.com"
      must_contain: "@"
    - label: Alerting email recipient
      enabled: "{{ alerting.enabled | default(false) | bool and alerting.email.enabled | default(false) | bool }}"
      value: "{{ alerting.email.to | default('') }}"
      placeholder: "ops@example.com"
      must_contain: "@"
  loop_control:
    label: "{{ item.label }}"
  when:
    - item.enabled | bool
    - invalid_value | bool
  run_once: true

- name: Validate Alertmanager notification secrets
  ansible.builtin.fail:
    msg: >-
      {{ item.label }} is missing, too short, or still using a placeholder value.
      Set it in inventory/group_vars/all/secrets.yml before deploying monitoring.
  vars:
    secret_value: "{{ vars[item.variable] | default('') | string | trim }}"
    secret_is_invalid: >-
      {{
        (secret_value | length < item.min_length)
        or (secret_value is match('^replace-with-'))
      }}
  loop:
    - label: Alertmanager SMTP username
      variable: vault_alertmanager_smtp_username
      enabled: "{{ alerting.enabled | default(false) | bool and alerting.email.enabled | default(false) | bool and alerting.email.auth_enabled | default(true) | bool }}"
      min_length: 1
    - label: Alertmanager SMTP password
      variable: vault_alertmanager_smtp_password
      enabled: "{{ alerting.enabled | default(false) | bool and alerting.email.enabled | default(false) | bool and alerting.email.auth_enabled | default(true) | bool }}"
      min_length: 1
    - label: Alertmanager Telegram bot token
      variable: vault_alertmanager_telegram_bot_token
      enabled: "{{ alerting.enabled | default(false) | bool and alerting.telegram.enabled | default(false) | bool }}"
      min_length: 20
    - label: Alertmanager Telegram chat ID
      variable: vault_alertmanager_telegram_chat_id
      enabled: "{{ alerting.enabled | default(false) | bool and alerting.telegram.enabled | default(false) | bool }}"
      min_length: 1
  loop_control:
    label: "{{ item.label }}"
  when:
    - item.enabled | bool
    - secret_is_invalid | bool
  run_once: true

- name: Deploy kube-prometheus-stack via Helm
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: prometheus
    chart_ref: prometheus-community/kube-prometheus-stack
    chart_version: "{{ artifact_versions.charts.kube_prometheus_stack }}"
    release_namespace: monitoring
    create_namespace: true
    wait: yes
    timeout: "1200s"
    values:
      prometheus:
        prometheusSpec:
          retention: "{{ monitoring.prometheus_retention }}"
          serviceMonitorSelectorNilUsesHelmValues: false
          serviceMonitorNamespaceSelector: {}
          podMonitorSelectorNilUsesHelmValues: false
          podMonitorNamespaceSelector: {}
          storageSpec:
            volumeClaimTemplate:
              spec:
                storageClassName: "{{ storage.storage_class }}"
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: "{{ storage.prometheus_size }}"
          nodeSelector:
            workload: "{{ cluster_topology.node_pools[monitoring.pool].workload_label }}"
          tolerations:
            - key:      "workload"
              operator: "Equal"
              value:    "{{ cluster_topology.node_pools[monitoring.pool].workload_label }}"
              effect:   "{{ cluster_topology.node_pools[monitoring.pool].taints[0].effect }}"
      alertmanager:
        config: "{{ (lookup('template', 'alertmanager-config.yaml.j2') | from_yaml) if alerting.enabled | default(false) | bool else {'global': {'resolve_timeout': '5m'}, 'route': {'receiver': 'null'}, 'receivers': [{'name': 'null'}]} }}"
        alertmanagerSpec:
          nodeSelector:
            workload: "{{ cluster_topology.node_pools[monitoring.pool].workload_label }}"
          tolerations:
            - key:      "workload"
              operator: "Equal"
              value:    "{{ cluster_topology.node_pools[monitoring.pool].workload_label }}"
              effect:   "{{ cluster_topology.node_pools[monitoring.pool].taints[0].effect }}"
      grafana:
        adminPassword: "{{ monitoring.grafana_admin_password }}"
        defaultDashboardsEnabled: false
        # ClusterIP — Ingress role handles external routing
        service:
          type: ClusterIP
          port: "{{ grafana_port }}"
        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
            labelValue: "1"
            folderAnnotation: grafana_folder
            searchNamespace: ALL
        nodeSelector:
          workload: "{{ cluster_topology.node_pools[monitoring.pool].workload_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ cluster_topology.node_pools[monitoring.pool].workload_label }}"
            effect:   "{{ cluster_topology.node_pools[monitoring.pool].taints[0].effect }}"
      prometheusOperator:
        nodeSelector:
          workload: "{{ cluster_topology.node_pools[monitoring.pool].workload_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ cluster_topology.node_pools[monitoring.pool].workload_label }}"
            effect:   "{{ cluster_topology.node_pools[monitoring.pool].taints[0].effect }}"
        admissionWebhooks:
          patch:
            nodeSelector:
              workload: "{{ cluster_topology.node_pools[monitoring.pool].workload_label }}"
            tolerations:
              - key:      "workload"
                operator: "Equal"
                value:    "{{ cluster_topology.node_pools[monitoring.pool].workload_label }}"
                effect:   "{{ cluster_topology.node_pools[monitoring.pool].taints[0].effect }}"
      kube-state-metrics:
        nodeSelector:
          workload: "{{ cluster_topology.node_pools[monitoring.pool].workload_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ cluster_topology.node_pools[monitoring.pool].workload_label }}"
            effect:   "{{ cluster_topology.node_pools[monitoring.pool].taints[0].effect }}"
      # node-exporter runs on ALL nodes as a DaemonSet.
      # Exists toleration ensures it bypasses every workload
      # taint so no node is left without host metrics.
      nodeExporter:
        enabled: true
        tolerations:
          - operator: "Exists"
            effect:   "NoSchedule"
  no_log: true

# ============================================================
# 2. Create Platform ServiceMonitors
# The Services exist from earlier roles, but the
# ServiceMonitor CRD only becomes available after the
# kube-prometheus-stack release is installed.
# ============================================================
- name: Create Traefik metrics ServiceMonitor
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', role_path + '/../k3s_master/templates/traefik-metrics-servicemonitor.yaml.j2') | from_yaml }}"

- name: Create Fluent Bit ServiceMonitor
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', role_path + '/../logging/templates/fluent-bit-servicemonitor.yaml.j2') | from_yaml }}"

- name: Create OpenSearch exporter ServiceMonitor
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', role_path + '/../logging/templates/opensearch-exporter-servicemonitor.yaml.j2') | from_yaml }}"

- name: Create MongoDB metrics ServiceMonitor
  become: true
  delegate_to: k8s-ctrl
  when: database.type == 'mongodb' and (database.mongodb.metrics.enabled | default(true) | bool)
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', role_path + '/../database/templates/mongodb-servicemonitor.yaml.j2') | from_yaml }}"

# ============================================================
# 3. Create Framework Alert Rules
# PrometheusRule CRDs are installed by kube-prometheus-stack.
# The release label keeps the rules selected by the Prometheus
# instance created by this Helm release.
# ============================================================
- name: Create framework platform PrometheusRule alerts
  become: true
  delegate_to: k8s-ctrl
  when: monitoring.alerts.enabled | default(true) | bool
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'prometheusrule-platform.yaml.j2') | from_yaml }}"

- name: Create framework database PrometheusRule alerts
  become: true
  delegate_to: k8s-ctrl
  when: monitoring.alerts.enabled | default(true) | bool
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'prometheusrule-database.yaml.j2') | from_yaml }}"

# ============================================================
# 4. Wait for Prometheus to Be Ready
# ============================================================
- name: Wait for Prometheus pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -l app.kubernetes.io/name=prometheus \
      -o jsonpath='{.items[0].status.phase}'
  register: prometheus_status
  until: prometheus_status.stdout == "Running"
  retries: 40
  delay: 15
  changed_when: false

# ============================================================
# 5. Wait for Grafana to Be Ready
# ============================================================
- name: Wait for Grafana pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -l app.kubernetes.io/name=grafana \
      -o jsonpath='{.items[0].status.phase}'
  register: grafana_status
  until: grafana_status.stdout == "Running"
  retries: 40
  delay: 15
  changed_when: false

- name: Create vendored infrastructure dashboards ConfigMap
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'grafana-community-dashboards-configmap.yaml.j2') | from_yaml }}"

- name: Create vendored platform dashboards ConfigMap
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'grafana-platform-dashboards-configmap.yaml.j2') | from_yaml }}"

# ============================================================
# 6. Wait for Alertmanager to Be Ready
# ============================================================
- name: Wait for Alertmanager pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -l app.kubernetes.io/name=alertmanager \
      -o jsonpath='{.items[0].status.phase}'
  register: alertmanager_status
  until: alertmanager_status.stdout == "Running"
  retries: 40
  delay: 15
  changed_when: false

# ============================================================
# 7. Verify Prometheus is Scraping Targets
# FIX: Write python script to temp file to avoid shell
# collapsing multiline code into a single broken line.
# ============================================================
- name: Write Prometheus target check script
  become: true
  ansible.builtin.copy:
    dest: /tmp/check_targets.py
    mode: '0755'
    content: |
      import sys, json
      d = json.load(sys.stdin)
      active = d['data']['activeTargets']
      print(f'Active targets: {len(active)}')

- name: Verify Prometheus is scraping targets
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl exec \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      $(kubectl get pod \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -n monitoring \
        -l app.kubernetes.io/name=prometheus \
        -o jsonpath='{.items[0].metadata.name}') \
      -c prometheus \
      -- wget -qO- http://localhost:9090/api/v1/targets \
      | python3 /tmp/check_targets.py
  register: prometheus_targets
  changed_when: false
  ignore_errors: true

- name: Show Prometheus scrape target count
  ansible.builtin.debug:
    msg: "{{ prometheus_targets.stdout }}"

# ============================================================
# 8. Show Monitoring Stack Pod Summary
# Final confirmation before handing off to Phase 7.
# Shows all pods in monitoring namespace with their
# node placement so you can verify pinning worked.
# ============================================================
- name: Show monitoring stack pod summary
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n monitoring \
      -o wide
  register: monitoring_pods
  changed_when: false

- name: Print monitoring stack pod summary
  ansible.builtin.debug:
    var: monitoring_pods.stdout_lines
