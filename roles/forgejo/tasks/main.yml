---
# ============================================================
# ROLE: forgejo
# Deploys Forgejo Git server connected to the PostgreSQL
# cluster managed by the database role.
#
# Ingress is handled separately by the ingress role in
# Phase 7 — this role only deploys the application itself.
#
# Depends on:
#   - common     (Helm installed + repos added)
#   - database   (PostgreSQL cluster must be healthy)
#   - k3s_worker (general workload pool must be ready + tainted)
# ============================================================

# ============================================================
# STEP 1: Create Forgejo Namespace
# ============================================================
- name: Create forgejo namespace
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: forgejo

# ============================================================
# STEP 2: Create Forgejo Admin Secret
# Credentials come from the shared group_vars configuration.
# Stored as a K8s Secret so they are never in Helm values.
# ============================================================
- name: Create Forgejo Admin Secret
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: forgejo-admin-secret
        namespace: forgejo
      type: Opaque
      stringData:
        username: "{{ forgejo.admin_username }}"
        password: "{{ forgejo.admin_password }}"
  no_log: true

# ============================================================
# STEP 3: Create DB Secret in the forgejo namespace
# Pods can only read secrets from their own namespace.
# This secret holds all DB connection details and is
# injected securely via environment variables — never
# stored as plaintext in the Helm values.
# All values reference the database block — app agnostic.
# ============================================================
- name: Create Forgejo DB Secret in forgejo namespace
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: forgejo-db-secret
        namespace: forgejo
      type: Opaque
      stringData:
        FORGEJO__database__DB_TYPE: "postgres"
        FORGEJO__database__HOST:    "{{ database.host }}:{{ database.port }}"
        FORGEJO__database__NAME:    "{{ database.app_db_name }}"
        FORGEJO__database__USER:    "{{ database.app_user }}"
        FORGEJO__database__PASSWD:  "{{ database.app_password }}"
  no_log: true

# ============================================================
# STEP 4: Wait for PostgreSQL RW Service to Be Available
# Prevents Forgejo crash-looping while DB is still starting.
# Uses dynamic cluster name from database block — not
# hardcoded — so this works for any CNPG cluster name.
# ============================================================
- name: Wait for PostgreSQL RW service to exist
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get svc {{ database.cluster_name }}-rw \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n db \
      -o jsonpath='{.metadata.name}' 2>/dev/null || echo "notfound"
  register: pg_svc_check
  until: pg_svc_check.stdout == "{{ database.cluster_name }}-rw"
  retries: 20
  delay: 15
  changed_when: false

# ============================================================
# STEP 5: Deploy Forgejo via OCI Helm Chart
#
# KEY POINTS:
#   - Single merged gitea: block (no duplicate keys)
#   - DB password injected from Secret via secretKeyRef
#   - Probes correctly nested inside gitea: block
#   - INSTALL_LOCK prevents web installer override
#   - DOMAIN and ROOT_URL use ingress hostname not raw IP
#   - All DB vars reference database block (app agnostic)
#   - Service type ClusterIP — ingress role handles routing
# ============================================================
- name: Deploy Forgejo via OCI Helm chart
  become: true
  delegate_to: k8s-ctrl
  community.kubernetes.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: forgejo
    chart_ref: oci://code.forgejo.org/forgejo-helm/forgejo
    chart_version: "{{ artifact_versions.charts.forgejo }}"
    release_namespace: forgejo
    create_namespace: false
    wait: yes
    timeout: "600s"
    values:

      # --------------------------------------------------------
      # Image
      # --------------------------------------------------------
      image:
        rootless: true

      # --------------------------------------------------------
      # Single gitea: block — all config merged here
      # --------------------------------------------------------
      gitea:

        # Admin credentials loaded from pre-created secret
        admin:
          existingSecret: forgejo-admin-secret
          email:          "{{ forgejo.admin_email }}"
          passwordMode:   keepUpdated

        # app.ini settings
        config:
          database:
            DB_TYPE: postgres
            HOST:    "{{ database.host }}:{{ database.port }}"
            NAME:    "{{ database.app_db_name }}"
            USER:    "{{ database.app_user }}"
            # PASSWD is intentionally omitted here —
            # it is injected securely via secretKeyRef below

          metrics:
            ENABLED: true

          server:
            HTTP_PORT: "{{ forgejo.port | int }}"
            PROTOCOL:  http
            # Use ingress hostname so clone URLs are correct
            DOMAIN:    "{{ ingress.forgejo_host }}"
            ROOT_URL:  "http://{{ ingress.forgejo_host }}"

          # Prevents web installer from overriding configuration
          security:
            INSTALL_LOCK: true

        # All DB env vars loaded securely from the K8s Secret
        # created in Step 3. Nothing sensitive is in plaintext.
        additionalConfigFromEnvs:
          - name: FORGEJO__database__DB_TYPE
            valueFrom:
              secretKeyRef:
                name: forgejo-db-secret
                key:  FORGEJO__database__DB_TYPE
          - name: FORGEJO__database__HOST
            valueFrom:
              secretKeyRef:
                name: forgejo-db-secret
                key:  FORGEJO__database__HOST
          - name: FORGEJO__database__NAME
            valueFrom:
              secretKeyRef:
                name: forgejo-db-secret
                key:  FORGEJO__database__NAME
          - name: FORGEJO__database__USER
            valueFrom:
              secretKeyRef:
                name: forgejo-db-secret
                key:  FORGEJO__database__USER
          - name: FORGEJO__database__PASSWD
            valueFrom:
              secretKeyRef:
                name: forgejo-db-secret
                key:  FORGEJO__database__PASSWD

        # Health probes — correctly placed inside gitea: block
        startupProbe:
          enabled: true
          tcpSocket:
            port: http
          initialDelaySeconds: 60
          periodSeconds:       10
          failureThreshold:    20

        livenessProbe:
          enabled: true
          tcpSocket:
            port: http
          initialDelaySeconds: 200
          periodSeconds:       10
          failureThreshold:    5

      # --------------------------------------------------------
      # Persistence
      # --------------------------------------------------------
      persistence:
        enabled:      true
        storageClass: "{{ storage.storage_class }}"
        size:         10Gi

      # --------------------------------------------------------
      # Node placement — pin to the configured general pool
      # --------------------------------------------------------
      nodeSelector:
        workload: "{{ cluster_topology.node_pools[forgejo.pool].workload_label }}"

      tolerations:
        - key:      "workload"
          operator: "Equal"
          value:    "{{ cluster_topology.node_pools[forgejo.pool].workload_label }}"
          effect:   "{{ cluster_topology.node_pools[forgejo.pool].taints[0].effect }}"

      # --------------------------------------------------------
      # Networking — ClusterIP only
      # Ingress role in Phase 7 handles external routing.
      # --------------------------------------------------------
      service:
        http:
          type: ClusterIP
          port: "{{ forgejo.port | int }}"

# ============================================================
# STEP 6: Expose Forgejo Metrics to Prometheus
# Forgejo serves Prometheus metrics from the application
# itself, so a small dedicated Service keeps scraping stable
# without coupling monitoring to the chart's main Service.
# ============================================================
- name: Create Forgejo metrics service
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'metrics-service.yaml.j2') | from_yaml }}"

- name: Create Forgejo metrics ServiceMonitor
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'metrics-servicemonitor.yaml.j2') | from_yaml }}"

# ============================================================
# STEP 7: Wait for Forgejo Pod to Be Running
# ============================================================
- name: Wait for Forgejo pod to be ready
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n forgejo \
      -l app.kubernetes.io/name=forgejo \
      -o jsonpath='{.items[0].status.phase}'
  register: forgejo_status
  until: forgejo_status.stdout == "Running"
  retries: 40
  delay: 15
  changed_when: false

# ============================================================
# STEP 8: Verify Forgejo is Connected to PostgreSQL
# Queries the Forgejo admin API to confirm the application
# started correctly and is connected to the database.
# A 200 response means Forgejo is fully initialised.
# ============================================================
- name: Look up Forgejo service ClusterIP
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get svc \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n forgejo \
      -l app.kubernetes.io/name=forgejo \
      -o jsonpath='{.items[0].spec.clusterIP}'
  register: forgejo_service_ip
  changed_when: false

- name: Verify Forgejo API is responding
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.command:
    argv:
      - curl
      - -sS
      - -o
      - /dev/null
      - -w
      - "%{http_code}"
      - "http://{{ forgejo_service_ip.stdout }}:{{ forgejo.port }}/api/healthz"
  register: forgejo_health
  until: forgejo_health.rc == 0 and forgejo_health.stdout == "200"
  retries: 20
  delay: 15
  changed_when: false

- name: Show Forgejo health check result
  ansible.builtin.debug:
    msg: "Forgejo API health check → HTTP {{ forgejo_health.stdout }}"

# ============================================================
# STEP 9: Show Forgejo Pod Summary
# Final confirmation — shows pod status, node placement
# and confirms it landed in the configured general pool.
# ============================================================
- name: Show Forgejo pod summary
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -n forgejo \
      -o wide
  register: forgejo_pods
  changed_when: false

- name: Print Forgejo pod summary
  ansible.builtin.debug:
    var: forgejo_pods.stdout_lines

# ============================================================
# STEP 10: Render and Apply Forgejo Ingress
# Done here — not in the ingress role — because the
# forgejo namespace must exist before the Ingress can
# be created and the namespace is created in STEP 1.
# Exposes: http://forgejo.local
# ============================================================
- name: Render Forgejo Ingress template
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.copy:
    content: "{{ lookup('template', 'forgejo-ingress.yaml.j2') }}"
    dest: /tmp/forgejo-ingress.yaml
    mode: '0644'

- name: Apply Forgejo Ingress
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl apply \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -f /tmp/forgejo-ingress.yaml
  register: forgejo_ingress_result
  changed_when: "'created' in forgejo_ingress_result.stdout or
                 'configured' in forgejo_ingress_result.stdout"

- name: Show Forgejo Ingress apply result
  ansible.builtin.debug:
    msg: "{{ forgejo_ingress_result.stdout }}"

- name: Remove Forgejo Ingress temp file
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.file:
    path: /tmp/forgejo-ingress.yaml
    state: absent

- name: Verify Forgejo is reachable through Ingress
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    curl -sk \
      -o /dev/null \
      -w "%{http_code}" \
      -H "Host: {{ ingress.forgejo_host }}" \
      http://{{ master_ip }}/
  register: forgejo_http_check
  until: forgejo_http_check.stdout in ['200', '302']
  retries: 20
  delay: 10
  changed_when: false

- name: Show Forgejo HTTP response code
  ansible.builtin.debug:
    msg: "Forgejo via Ingress → HTTP {{ forgejo_http_check.stdout }}"

# ============================================================
# STEP 10: Print Final Access Summary
# ============================================================
- name: Print framework access summary
  ansible.builtin.debug:
    msg:
      - "=============================================="
      - " Observability Framework — Access Summary"
      - "=============================================="
      - ""
      - " Add to /etc/hosts on your host machine:"
      - " {{ master_ip }}  {{ ingress.forgejo_host }}"
      - " {{ master_ip }}  {{ ingress.grafana_host }}"
      - " {{ master_ip }}  {{ ingress.opensearch_host }}"
      - ""
      - " Service URLs:"
      - " Forgejo    → http://{{ ingress.forgejo_host }}"
      - " Grafana    → http://{{ ingress.grafana_host }}"
      - " OpenSearch → http://{{ ingress.opensearch_host }}"
      - "=============================================="
