---
# ============================================================
# STEP 1: Create Forgejo Namespace
# ============================================================
- name: Create forgejo namespace
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: forgejo

# ============================================================
# STEP 2: Create Forgejo Admin Secret
# ============================================================
- name: Create Forgejo Admin Secret
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: forgejo-admin-secret
        namespace: forgejo
      type: Opaque
      stringData:
        username: "{{ forgejo.admin_username }}"
        password: "{{ forgejo.admin_password }}"

# ============================================================
# STEP 3: Create DB Secret in the forgejo namespace
# Pods can only read secrets from their own namespace.
# This secret holds all DB connection details and is
# injected securely via environment variables — never
# stored as plaintext in the Helm values.
# ============================================================
- name: Create Forgejo DB Secret in forgejo namespace
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: forgejo-db-secret
        namespace: forgejo
      type: Opaque
      stringData:
        FORGEJO__database__DB_TYPE: "postgres"
        FORGEJO__database__HOST:    "{{ forgejo.db_host }}"
        FORGEJO__database__NAME:    "{{ forgejo.db_name }}"
        FORGEJO__database__USER:    "{{ forgejo.db_user }}"
        FORGEJO__database__PASSWD:  "{{ forgejo.db_password }}"

# ============================================================
# STEP 4: Wait for PostgreSQL RW service to be available
# Prevents Forgejo crash-looping while DB is still starting
# ============================================================
- name: Wait for PostgreSQL RW service to exist
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get svc app-db-cluster-rw -n db \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -o jsonpath='{.metadata.name}' 2>/dev/null || echo "notfound"
  register: pg_svc_check
  until: pg_svc_check.stdout == "app-db-cluster-rw"
  retries: 20
  delay: 15
  changed_when: false

# ============================================================
# STEP 5: Deploy Forgejo via OCI Helm Chart
#
# KEY POINTS:
#   - Single merged gitea: block (no duplicate keys)
#   - DB password injected from Secret via secretKeyRef
#   - Probes correctly nested inside gitea: block
#   - INSTALL_LOCK prevents web installer override
#   - master_ip var used instead of hardcoded IP
# ============================================================
- name: Deploy Forgejo via OCI Helm chart
  become: true
  delegate_to: k8s-ctrl
  community.kubernetes.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: forgejo
    chart_ref: oci://code.forgejo.org/forgejo-helm/forgejo
    release_namespace: forgejo
    create_namespace: false
    wait: yes
    timeout: "600s"
    values:

      # --------------------------------------------------------
      # Image
      # --------------------------------------------------------
      image:
        rootless: true

      # --------------------------------------------------------
      # Single gitea: block — all config merged here
      # --------------------------------------------------------
      gitea:

        # Admin credentials loaded from pre-created secret
        admin:
          existingSecret: forgejo-admin-secret
          email:          "{{ forgejo.admin_email }}"
          passwordMode:   keepUpdated

        # app.ini settings
        config:
          database:
            DB_TYPE: postgres
            HOST:    "{{ forgejo.db_host }}"
            NAME:    "{{ forgejo.db_name }}"
            USER:    "{{ forgejo.db_user }}"
            # PASSWD is intentionally omitted here —
            # it is injected securely via secretKeyRef below

          metrics:
            ENABLED: true

          server:
            HTTP_PORT: "{{ forgejo.port | int }}"
            PROTOCOL:  http
            DOMAIN:    "{{ master_ip }}"
            ROOT_URL:  "http://{{ master_ip }}:{{ forgejo.port }}"

          # Prevents web installer from overriding configuration
          security:
            INSTALL_LOCK: true

        # All DB env vars loaded securely from the K8s Secret
        # created in Step 3. Nothing sensitive is in plaintext.
        additionalConfigFromEnvs:
          - name: FORGEJO__database__DB_TYPE
            valueFrom:
              secretKeyRef:
                name: forgejo-db-secret
                key:  FORGEJO__database__DB_TYPE
          - name: FORGEJO__database__HOST
            valueFrom:
              secretKeyRef:
                name: forgejo-db-secret
                key:  FORGEJO__database__HOST
          - name: FORGEJO__database__NAME
            valueFrom:
              secretKeyRef:
                name: forgejo-db-secret
                key:  FORGEJO__database__NAME
          - name: FORGEJO__database__USER
            valueFrom:
              secretKeyRef:
                name: forgejo-db-secret
                key:  FORGEJO__database__USER
          - name: FORGEJO__database__PASSWD
            valueFrom:
              secretKeyRef:
                name: forgejo-db-secret
                key:  FORGEJO__database__PASSWD

        # Health probes — correctly placed inside gitea: block
        startupProbe:
          enabled: true
          tcpSocket:
            port: http
          initialDelaySeconds: 60
          periodSeconds:       10
          failureThreshold:    20

        livenessProbe:
          enabled: true
          tcpSocket:
            port: http
          initialDelaySeconds: 200
          periodSeconds:       10
          failureThreshold:    5

      # --------------------------------------------------------
      # Persistence
      # --------------------------------------------------------
      persistence:
        enabled:      true
        storageClass: "{{ storage.storage_class }}"
        size:         10Gi

      # --------------------------------------------------------
      # Node placement — pin to app-worker, bypass taint
      # --------------------------------------------------------
      nodeSelector:
        workload: app

      tolerations:
        - key:      "workload"
          operator: "Equal"
          value:    "app"
          effect:   "NoSchedule"

      # --------------------------------------------------------
      # Networking
      # --------------------------------------------------------
      service:
        http:
          type: LoadBalancer
          port: "{{ forgejo.port | int }}"