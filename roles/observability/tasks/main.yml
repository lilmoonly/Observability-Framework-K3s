---
# 1. Install Tools & Repos
- name: Ensure Helm is installed on master
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Add Helm repos
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    /usr/local/bin/helm repo add opensearch https://opensearch-project.github.io/helm-charts/
    /usr/local/bin/helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
    /usr/local/bin/helm repo add cnpg https://cloudnative-pg.github.io/charts
    /usr/local/bin/helm repo add fluent https://fluent.github.io/helm-charts
    /usr/local/bin/helm repo update

# 2. Prepare Nodes (Taints)
- name: Taint nodes for workload isolation
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    kubectl taint nodes k8s-ctrl node-role.kubernetes.io/master=true:NoSchedule --overwrite || true
    kubectl taint nodes app-worker workload=app:NoSchedule --overwrite || true
    kubectl taint nodes db-worker workload=db:NoSchedule --overwrite || true
    kubectl taint nodes logging-node workload=logging:NoSchedule --overwrite || true
    kubectl taint nodes monitor-node workload=monitoring:NoSchedule --overwrite || true
    kubectl taint nodes ai-node workload=ai:NoSchedule --overwrite || true
  register: taint_result
  changed_when: false

# 3. Deploy OpenSearch (Database)
- name: Deploy OpenSearch via Helm
  become: true
  delegate_to: k8s-ctrl
  community.kubernetes.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: opensearch
    chart_ref: opensearch/opensearch
    release_namespace: opensearch
    create_namespace: true
    wait: yes
    timeout: 1500s
    values:
      persistence:
        enabled: true
        storageClass: "{{ storage.storage_class }}"
      singleNode: true
      securityConfig:
        enabled: true
      extraEnvs:
        - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
          value: "{{ opensearch.admin_password }}"
        - name: node.store.allow_mmap
          value: "false"
        - name: OPENSEARCH_JAVA_OPTS
          value: "-Xmx{{ opensearch.heap_size }} -Xms{{ opensearch.heap_size }}"
      nodeSelector:
        workload: "{{ opensearch.node_selector_label }}"
      tolerations:
        - operator: "Exists"
          effect: "NoSchedule"
      resources:
        limits:
          memory: 2Gi
      startupProbe:
        tcpSocket:
          port: 9200
        initialDelaySeconds: 180
        periodSeconds: 10
        failureThreshold: 60

# 4. Deploy OpenSearch Dashboards (UI)
- name: Deploy OpenSearch Dashboards via Helm
  become: true
  delegate_to: k8s-ctrl
  community.kubernetes.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: opensearch-dashboards
    chart_ref: opensearch/opensearch-dashboards
    release_namespace: opensearch
    wait: yes
    values:
      opensearchHosts: "https://opensearch-cluster-master:9200"
      config:
        opensearch_dashboards.yml:
          server.host: "0.0.0.0"
          opensearch.ssl.verificationMode: none
          opensearch.username: "admin"
          opensearch.password: "{{ opensearch.admin_password }}"
      service:
        type: LoadBalancer
        port: "{{ opensearch_dashboards_port }}"
      nodeSelector:
        workload: "logging"
      tolerations:
        - operator: "Exists"
          effect: "NoSchedule"

# 5. Deploy Fluent-bit (Log Collector)
- name: Deploy Fluent-bit via Helm
  become: true
  delegate_to: k8s-ctrl
  community.kubernetes.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: fluent-bit
    chart_ref: fluent/fluent-bit
    release_namespace: opensearch
    wait: yes
    values:
      config:
        outputs: |
          [OUTPUT]
              Name  es
              Match *
              Host  opensearch-cluster-master.opensearch.svc.cluster.local
              Port  9200
              HTTP_User admin
              HTTP_Passwd {{ opensearch.admin_password }}
              tls On
              tls.verify Off
              Index fluent-bit
              Suppress_Type_Name On
      tolerations:
        - operator: "Exists"
          effect: "NoSchedule"

# 6. Deploy Prometheus Stack
- name: Deploy kube-prometheus-stack via Helm
  become: true
  delegate_to: k8s-ctrl
  community.kubernetes.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: prometheus
    chart_ref: prometheus-community/kube-prometheus-stack
    release_namespace: monitoring
    create_namespace: true
    wait: yes
    timeout: 1200s
    values:
      prometheus:
        prometheusSpec:
          retention: "{{ monitoring.prometheus_retention }}"
          storageSpec:
            volumeClaimTemplate:
              spec:
                storageClassName: "{{ storage.storage_class }}"
                accessModes: [ "ReadWriteOnce" ]
                resources:
                  requests:
                    storage: "{{ storage.prometheus_size }}"
          nodeSelector:
            workload: "{{ monitoring.node_selector_label }}"
          tolerations:
            - key: "workload"
              operator: "Equal"
              value: "{{ monitoring.node_selector_label }}"
              effect: "NoSchedule"
      alertmanager:
        alertmanagerSpec:
          nodeSelector:
            workload: "{{ monitoring.node_selector_label }}"
          tolerations:
            - key: "workload"
              operator: "Equal"
              value: "{{ monitoring.node_selector_label }}"
              effect: "NoSchedule"
      grafana:
        adminPassword: "{{ monitoring.grafana_admin_password }}"
        service:
          type: LoadBalancer
          port: "{{ grafana_port }}"
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key: "workload"
            operator: "Equal"
            value: "{{ monitoring.node_selector_label }}"
            effect: "NoSchedule"
      prometheusOperator:
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key: "workload"
            operator: "Equal"
            value: "{{ monitoring.node_selector_label }}"
            effect: "NoSchedule"
        admissionWebhooks:
          patch:
            nodeSelector:
              workload: "{{ monitoring.node_selector_label }}"
            tolerations:
              - key: "workload"
                operator: "Equal"
                value: "{{ monitoring.node_selector_label }}"
                effect: "NoSchedule"
      kube-state-metrics:
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key: "workload"
            operator: "Equal"
            value: "{{ monitoring.node_selector_label }}"
            effect: "NoSchedule"
      nodeExporter:
        enabled: true
        tolerations:
          - operator: "Exists"
            effect: "NoSchedule"

# 7. Database Setup
- name: Install CloudNativePG operator
  become: true
  delegate_to: k8s-ctrl
  community.kubernetes.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: cnpg-operator
    chart_ref: cnpg/cloudnative-pg
    release_namespace: cnpg-system
    create_namespace: true
    wait: yes
    values:
      # Allow the operator to run on any node despite taints
      tolerations:
        - operator: "Exists"
      nodeSelector:
        workload: "db"

- name: Create db namespace
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: db
    kind: Namespace
    state: present
  delegate_to: k8s-ctrl

- name: Create app-db-secret
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: app-db-secret
        namespace: db
      type: Opaque
      stringData:
        username: "{{ forgejo.db_user }}"
        password: "{{ forgejo.db_password }}"
  delegate_to: k8s-ctrl

- name: Deploy PostgreSQL Cluster
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    template: "postgres-cluster.yaml.j2"
    wait: yes