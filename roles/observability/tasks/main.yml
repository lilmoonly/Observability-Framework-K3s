---
# ============================================================
# 1. Install Tools & Repos
# ============================================================
- name: Ensure Helm is installed on master
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Add Helm repos
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    /usr/local/bin/helm repo add opensearch https://opensearch-project.github.io/helm-charts/
    /usr/local/bin/helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
    /usr/local/bin/helm repo add cnpg https://cloudnative-pg.github.io/charts
    /usr/local/bin/helm repo add fluent https://fluent.github.io/helm-charts
    /usr/local/bin/helm repo update

# ============================================================
# 2. Prepare Nodes (Taints & Network)
# ============================================================
- name: Taint nodes for workload isolation
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    kubectl taint nodes k8s-ctrl node-role.kubernetes.io/master=true:NoSchedule --overwrite || true
    kubectl taint nodes app-worker workload=app:NoSchedule --overwrite || true
    kubectl taint nodes db-worker workload=db:PreferNoSchedule --overwrite || true
    kubectl taint nodes logging-node workload=logging:NoSchedule --overwrite || true
    kubectl taint nodes monitor-node workload=monitoring:NoSchedule --overwrite || true
    kubectl taint nodes ai-node workload=ai:NoSchedule --overwrite || true
  register: taint_result
  changed_when: false

# ============================================================
# FIX: Ensure iptables FORWARD chain is open on db-worker
# Without this, flannel pod-to-pod traffic is dropped which
# breaks CNPG replication and API server connectivity
# ============================================================
- name: Fix iptables FORWARD chain on db-worker
  become: true
  delegate_to: db-worker
  ansible.builtin.shell: |
    iptables -P FORWARD ACCEPT
  changed_when: false


# ============================================================
# DIAGNOSTIC: Verify db-worker can reach API server
# ============================================================
- name: Verify db-worker can reach K3s API server
  become: true
  delegate_to: db-worker
  ansible.builtin.shell: |
    curl -sk https://{{ master_ip }}:6443/healthz
  register: api_reach
  changed_when: false

- name: Show API reachability from db-worker
  ansible.builtin.debug:
    msg: "db-worker -> API server: {{ api_reach.stdout }}"

# ============================================================
# 3. Deploy OpenSearch
# ============================================================
- name: Deploy OpenSearch via Helm
  become: true
  delegate_to: k8s-ctrl
  community.kubernetes.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: opensearch
    chart_ref: opensearch/opensearch
    release_namespace: opensearch
    create_namespace: true
    wait: yes
    timeout: 1500s
    values:
      persistence:
        enabled: true
        storageClass: "{{ storage.storage_class }}"
      singleNode: true
      securityConfig:
        enabled: true
      extraEnvs:
        - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
          value: "{{ opensearch.admin_password }}"
        - name: node.store.allow_mmap
          value: "false"
        - name: OPENSEARCH_JAVA_OPTS
          value: "-Xmx{{ opensearch.heap_size }} -Xms{{ opensearch.heap_size }}"
      nodeSelector:
        workload: "{{ opensearch.node_selector_label }}"
      tolerations:
        - operator: "Exists"
          effect: "NoSchedule"
      resources:
        limits:
          memory: 2Gi
      startupProbe:
        tcpSocket:
          port: 9200
        initialDelaySeconds: 180
        periodSeconds: 10
        failureThreshold: 60

# ============================================================
# 4. Deploy OpenSearch Dashboards
# ============================================================
- name: Deploy OpenSearch Dashboards via Helm
  become: true
  delegate_to: k8s-ctrl
  community.kubernetes.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: opensearch-dashboards
    chart_ref: opensearch/opensearch-dashboards
    release_namespace: opensearch
    wait: yes
    values:
      opensearchHosts: "https://opensearch-cluster-master:9200"
      config:
        opensearch_dashboards.yml:
          server.host: "0.0.0.0"
          opensearch.ssl.verificationMode: none
          opensearch.username: "admin"
          opensearch.password: "{{ opensearch.admin_password }}"
      service:
        type: LoadBalancer
        port: "{{ opensearch_dashboards_port }}"
      nodeSelector:
        workload: "logging"
      tolerations:
        - operator: "Exists"
          effect: "NoSchedule"

# ============================================================
# 5. Deploy Fluent-bit
# ============================================================
- name: Deploy Fluent-bit via Helm
  become: true
  delegate_to: k8s-ctrl
  community.kubernetes.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: fluent-bit
    chart_ref: fluent/fluent-bit
    release_namespace: opensearch
    wait: yes
    values:
      config:
        outputs: |
          [OUTPUT]
              Name  es
              Match *
              Host  opensearch-cluster-master.opensearch.svc.cluster.local
              Port  9200
              HTTP_User admin
              HTTP_Passwd {{ opensearch.admin_password }}
              tls On
              tls.verify Off
              Index fluent-bit
              Suppress_Type_Name On
      tolerations:
        - operator: "Exists"
          effect: "NoSchedule"

# ============================================================
# 6. Deploy Prometheus Stack
# ============================================================
- name: Deploy kube-prometheus-stack via Helm
  become: true
  delegate_to: k8s-ctrl
  community.kubernetes.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: prometheus
    chart_ref: prometheus-community/kube-prometheus-stack
    release_namespace: monitoring
    create_namespace: true
    wait: yes
    timeout: 1200s
    values:
      prometheus:
        prometheusSpec:
          retention: "{{ monitoring.prometheus_retention }}"
          storageSpec:
            volumeClaimTemplate:
              spec:
                storageClassName: "{{ storage.storage_class }}"
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: "{{ storage.prometheus_size }}"
          nodeSelector:
            workload: "{{ monitoring.node_selector_label }}"
          tolerations:
            - key:      "workload"
              operator: "Equal"
              value:    "{{ monitoring.node_selector_label }}"
              effect:   "NoSchedule"
      alertmanager:
        alertmanagerSpec:
          nodeSelector:
            workload: "{{ monitoring.node_selector_label }}"
          tolerations:
            - key:      "workload"
              operator: "Equal"
              value:    "{{ monitoring.node_selector_label }}"
              effect:   "NoSchedule"
      grafana:
        adminPassword: "{{ monitoring.grafana_admin_password }}"
        service:
          type: LoadBalancer
          port: "{{ grafana_port }}"
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ monitoring.node_selector_label }}"
            effect:   "NoSchedule"
      prometheusOperator:
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ monitoring.node_selector_label }}"
            effect:   "NoSchedule"
        admissionWebhooks:
          patch:
            nodeSelector:
              workload: "{{ monitoring.node_selector_label }}"
            tolerations:
              - key:      "workload"
                operator: "Equal"
                value:    "{{ monitoring.node_selector_label }}"
                effect:   "NoSchedule"
      kube-state-metrics:
        nodeSelector:
          workload: "{{ monitoring.node_selector_label }}"
        tolerations:
          - key:      "workload"
            operator: "Equal"
            value:    "{{ monitoring.node_selector_label }}"
            effect:   "NoSchedule"
      nodeExporter:
        enabled: true
        tolerations:
          - operator: "Exists"
            effect:   "NoSchedule"

# ============================================================
# 7. Database Setup
# ============================================================
- name: Install CloudNativePG operator
  become: true
  delegate_to: k8s-ctrl
  community.kubernetes.helm:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: cnpg-operator
    chart_ref: cnpg/cloudnative-pg
    release_namespace: cnpg-system
    create_namespace: true
    wait: yes
    values:
      nodeSelector:
        workload: "db"
      tolerations:
        - key:      "workload"
          operator: "Equal"
          value:    "db"
          effect:   "PreferNoSchedule"

- name: Create db namespace
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    name: db
    kind: Namespace
    state: present

# ============================================================
# App user secret (used by CNPG bootstrap to create the DB)
# ============================================================
- name: Create app-db-secret in db namespace
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: app-db-secret
        namespace: db
      type: Opaque
      stringData:
        username: "{{ database.app_user }}"
        password: "{{ database.app_password }}"

# ============================================================
# FIX: Superuser secret required by CNPG operator for
# internal management including replication coordination
# ============================================================
- name: Create app-db-superuser-secret in db namespace
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: app-db-superuser-secret
        namespace: db
      type: Opaque
      stringData:
        username: "postgres"
        password: "{{ database.superuser_password }}"

# ============================================================
# FIX: Clean recreate of cluster if it already exists
# CNPG cluster specs are mostly immutable — a clean
# recreate is safer than trying to patch a broken cluster
# ============================================================
- name: Check if PostgreSQL cluster already exists
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get cluster {{ database.cluster_name }} -n db \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -o jsonpath='{.metadata.name}' 2>/dev/null || echo "notfound"
  register: cluster_exists
  changed_when: false

- name: Delete existing PostgreSQL cluster for clean recreate
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: absent
    definition:
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      metadata:
        name: "{{ database.cluster_name }}"
        namespace: db
  when: cluster_exists.stdout != "notfound"

- name: Wait for old cluster pods to fully terminate
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get pods -n db \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -l cnpg.io/cluster={{ database.cluster_name }} \
      -o jsonpath='{.items[*].metadata.name}'
  register: old_pods
  until: old_pods.stdout == ""
  retries: 20
  delay: 10
  changed_when: false
  when: cluster_exists.stdout != "notfound"

# ============================================================
# Deploy the corrected PostgreSQL Cluster
# ============================================================
- name: Deploy PostgreSQL Cluster
  become: true
  delegate_to: k8s-ctrl
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition: "{{ lookup('template', 'postgres-cluster.yaml.j2') | from_yaml }}"
  register: pg_deploy

- name: Wait for PostgreSQL Cluster to be Healthy
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl get cluster {{ database.cluster_name }} -n db \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -o jsonpath='{.status.phase}'
  register: cluster_phase
  until: cluster_phase.stdout == "Cluster in healthy state"
  retries: 40
  delay: 15
  changed_when: false

# ============================================================
# VERIFY: Check replication is working after deployment
# ============================================================
- name: Verify replication status on primary
  become: true
  delegate_to: k8s-ctrl
  ansible.builtin.shell: |
    kubectl exec -n db \
      $(kubectl get pod -n db \
        -l cnpg.io/cluster={{ database.cluster_name }},role=primary \
        --kubeconfig /etc/rancher/k3s/k3s.yaml \
        -o jsonpath='{.items[0].metadata.name}') \
      --kubeconfig /etc/rancher/k3s/k3s.yaml \
      -- psql -U postgres -c \
      "SELECT client_addr, state, sent_lsn, replay_lsn FROM pg_stat_replication;"
  register: replication_status
  changed_when: false

- name: Show replication status
  ansible.builtin.debug:
    var: replication_status.stdout_lines