---
# ============================================================
# ROLE: database
# Dispatches the selected database backend.
#
# Supported values:
#   - database.type=postgresql
#   - database.type=mongodb
# ============================================================

- name: Validate selected database backend
  ansible.builtin.fail:
    msg: >-
      Unsupported database.type='{{ database.type }}'.
      Supported values are 'postgresql' and 'mongodb'.
  when: database.type not in ['postgresql', 'mongodb']

- name: Deploy PostgreSQL backend
  ansible.builtin.include_tasks: postgresql.yml
  when: database.type == 'postgresql'

- name: Deploy MongoDB backend
  ansible.builtin.include_tasks: mongodb.yml
  when: database.type == 'mongodb'
